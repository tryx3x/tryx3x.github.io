<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Досье</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/*
  design read: личное досье участника комьюнити (модерация + игровой бан +
  Twitch-дропсы) для аудитории геймеров/зрителей стрима. Язык — "системный
  отчёт/досье", не шаблонный gamer-дашборд с фиолетовым свечением.
  dials: variance 6 / motion 4 / density 5 — данных много, но подача
  строгая, не художественно-воздушная.
  Сигнатура: манифест-списки с разделителями вместо стопки карточек;
  "печать" вместо бейджа для статуса бана; построчная выдача при загрузке.
*/
:root{
  --bg:#0A0A0B;
  --panel:#111113;
  --line:#232326;
  --line-soft:#1A1A1D;
  --ink:#EDEDEE;
  --dim:#77777D;
  --amber:#D9A455;
  --red:#D9555F;
  --green:#57C08C;
  --twitch:#9146FF;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:var(--bg);
  color:var(--ink);
  padding:14px 14px 88px;
  -webkit-font-smoothing:antialiased;
}
.display{font-family:'Unbounded',sans-serif}
.mono{font-family:'IBM Plex Mono',monospace}

/* ── Тикер статуса ── */
.ticker{
  font-family:'IBM Plex Mono';font-size:10.5px;font-weight:500;
  letter-spacing:.12em;text-transform:uppercase;color:var(--dim);
  padding-bottom:10px;margin-bottom:12px;
  border-bottom:1px solid var(--line-soft);
  display:flex;align-items:center;gap:8px;
}
.ticker .cur{color:var(--ink)}
.ticker .dot{width:5px;height:5px;border-radius:50%;background:var(--green);flex:none}
.ticker .dot.warn{background:var(--amber)}
.ticker .dot.bad{background:var(--red)}

/* ── Заголовок досье ── */
.file-head{padding-bottom:14px;margin-bottom:4px;border-bottom:1px solid var(--line)}
.file-id{font-family:'IBM Plex Mono';font-size:11px;color:var(--dim);letter-spacing:.05em}
.file-name{font-family:'Unbounded';font-weight:600;font-size:19px;margin-top:5px;line-height:1.25;word-break:break-word}

/* ── Табы как поля брекетов ── */
.tabs{
  position:fixed;left:0;right:0;bottom:0;z-index:10;
  display:flex;
  background:var(--bg);
  border-top:1px solid var(--line);
  padding:8px 8px calc(8px + env(safe-area-inset-bottom));
}
.tab{
  flex:1;border:none;background:transparent;color:var(--dim);
  font-family:'IBM Plex Mono';font-weight:500;font-size:13px;
  letter-spacing:.04em;text-transform:uppercase;
  padding:13px 4px;cursor:pointer;position:relative;
}
.tab.active{color:var(--ink)}
.tab.active::after{
  content:"";position:absolute;left:18%;right:18%;bottom:2px;height:2px;
  background:var(--amber);
}
@media (max-width:430px){
  .tab{font-size:12px;padding:14px 2px;letter-spacing:.02em}
  body{padding-bottom:96px}
}

/* ── Секции ── */
.section{display:none;margin-top:14px}
.section.active{display:block}

/* ── Манифест: список с разделителями, не коробки ── */
.manifest{border-top:1px solid var(--line)}
.row{
  padding:13px 0;
  border-bottom:1px solid var(--line-soft);
  opacity:0;transform:translateY(6px);
  animation:reveal .32s ease forwards;
}
@keyframes reveal{to{opacity:1;transform:none}}
@media (prefers-reduced-motion:reduce){.row{animation:none;opacity:1;transform:none}}
.row:nth-child(1){animation-delay:.02s}
.row:nth-child(2){animation-delay:.08s}
.row:nth-child(3){animation-delay:.14s}
.row:nth-child(4){animation-delay:.20s}
.row:nth-child(5){animation-delay:.26s}

.row-top{display:flex;justify-content:space-between;align-items:baseline;gap:10px}
.row-label{font-size:13.5px;font-weight:600}
.row-val{font-family:'IBM Plex Mono';font-size:12px;color:var(--dim)}
.row-note{margin-top:6px;font-size:12px;color:var(--dim);line-height:1.55}
.row-note b{color:var(--ink);font-weight:600}

/* ── Индикатор варнов: тонкие сегменты в строку с числом ── */
.gauge{display:flex;align-items:center;gap:9px;margin-top:9px}
.gauge-track{flex:1;display:flex;gap:4px}
.seg{flex:1;height:3px;background:var(--line);}
.seg.on{background:var(--amber)}
.gauge-num{font-family:'IBM Plex Mono';font-size:11px;color:var(--dim);flex:none}

/* ── Печать статуса ── */
.stamp{
  display:inline-block;margin-top:11px;
  padding:7px 14px;
  border:1.5px solid var(--red);
  color:var(--red);
  font-family:'IBM Plex Mono';font-weight:600;font-size:11px;
  letter-spacing:.14em;text-transform:uppercase;
  transform:rotate(-2deg);
}
.stamp.pending{border-color:var(--amber);color:var(--amber)}

.empty{padding:32px 0;text-align:center}
.empty .big{font-family:'Unbounded';font-weight:600;font-size:14.5px;color:var(--ink);display:block;margin-bottom:5px}
.empty .sub{font-size:12.5px;color:var(--dim)}

.bar{height:3px;background:var(--line);margin-top:11px;overflow:hidden}
.bar-fill{height:100%;background:var(--amber)}
.bar-note{margin-top:7px;font-size:11.5px;color:var(--dim)}

.btn{
  display:block;width:100%;margin-top:12px;
  padding:12px;border:1px solid var(--line);
  background:transparent;color:var(--ink);
  font-family:'IBM Plex Mono';font-weight:500;font-size:11.5px;
  letter-spacing:.06em;text-transform:uppercase;
  cursor:pointer;
}
.btn.accent{border-color:var(--amber);color:var(--amber)}
.btn.tw{border-color:var(--twitch);color:var(--twitch)}
.btn:active{opacity:.6}

/* ── Twitch ── */
.tw-readout{padding:6px 0 16px;border-bottom:1px solid var(--line);margin-bottom:14px}
.tw-num{font-family:'IBM Plex Mono';font-weight:500;font-size:32px;color:var(--twitch);letter-spacing:-.01em}
.tw-cap{font-family:'IBM Plex Mono';font-size:10px;color:var(--dim);letter-spacing:.1em;text-transform:uppercase;margin-top:4px}

.day-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--line-soft)}
.day-date{width:46px;flex:none;font-family:'IBM Plex Mono';font-size:10.5px;color:var(--dim)}
.day-bar{flex:1;height:3px;background:var(--line);overflow:hidden}
.day-fill{height:100%;background:var(--twitch)}
.day-val{width:50px;flex:none;text-align:right;font-family:'IBM Plex Mono';font-size:10.5px;color:var(--ink)}

.steps{margin-top:4px}
.step{display:flex;gap:11px;padding:11px 0;border-bottom:1px solid var(--line-soft)}
.step-n{flex:none;font-family:'IBM Plex Mono';font-size:11px;color:var(--dim)}
.step-t{font-size:12.5px;line-height:1.55;color:var(--ink)}
.step-t code{
  font-family:'IBM Plex Mono';font-size:11px;
  color:var(--twitch);
}

/* ── Заявка на амнистию ── */
.overlay{position:fixed;inset:0;z-index:20;display:none;background:rgba(0,0,0,.75);padding:14px;align-items:flex-end}
.overlay.open{display:flex}
.sheet{width:100%;background:var(--panel);border:1px solid var(--line);padding:18px}
.sheet h3{font-family:'Unbounded';font-size:13.5px;font-weight:600;margin-bottom:6px}
.sheet p{font-size:12px;color:var(--dim);line-height:1.55;margin-bottom:11px}
textarea{
  width:100%;min-height:104px;resize:vertical;
  background:var(--bg);border:1px solid var(--line);
  padding:11px;color:var(--ink);
  font-family:inherit;font-size:13.5px;line-height:1.5;outline:none;
}
textarea:focus{border-color:var(--amber)}
.err{text-align:center;padding:56px 20px;color:var(--dim);line-height:1.7;font-size:13px}

/* ── Админка ── */
.mini-btn{
  border:1px solid var(--line);background:transparent;color:var(--dim);
  font-family:'IBM Plex Mono';font-size:10px;letter-spacing:.04em;
  padding:5px 9px;cursor:pointer;flex:none;
}
.mini-btn:active{opacity:.6}
.mod-line{display:flex;gap:7px;margin-top:10px}
.inp{
  flex:1;min-width:0;background:var(--bg);border:1px solid var(--line);
  color:var(--ink);font-family:'IBM Plex Mono';font-size:12px;
  padding:9px 10px;outline:none;
}
.inp:focus{border-color:var(--amber)}
.mod-chip{
  display:inline-flex;align-items:center;gap:7px;
  margin:8px 6px 0 0;padding:5px 9px;
  border:1px solid var(--line);font-size:11px;color:var(--dim);
}
.mod-chip span{cursor:pointer;color:var(--red);font-size:12px}
.mod-box{border:1px solid var(--line);padding:11px;margin-top:10px}
.perms{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.perm{
  border:1px solid var(--line);background:transparent;color:var(--dim);
  font-family:'IBM Plex Mono';font-size:11px;
  padding:6px 10px;cursor:pointer;
}
.perm.on{border-color:var(--green);color:var(--green)}
.perm:active{opacity:.6}
.owner-badge{
  display:inline-block;font-family:'IBM Plex Mono';font-size:10px;
  color:var(--amber);border:1px solid var(--amber);
  padding:2px 7px;margin-left:6px;vertical-align:middle;letter-spacing:.04em;
}
.sub-h{font-size:12px;color:var(--dim);margin:14px 0 8px;font-family:'IBM Plex Mono';text-transform:uppercase;letter-spacing:.06em}
.pick-list{display:flex;flex-wrap:wrap;gap:6px}
.pick{
  border:1px solid var(--line);background:transparent;color:var(--ink);
  font-size:12px;padding:7px 11px;cursor:pointer;font-family:inherit;
}
.pick:active{opacity:.6;border-color:var(--green)}
.chat-item{
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  width:100%;text-align:left;
  background:var(--surface);border:1px solid var(--line);
  padding:14px;margin-bottom:8px;cursor:pointer;color:var(--ink);
}
.chat-item:active{border-color:var(--amber)}
.chat-item-name{font-size:14px;font-weight:600;word-break:break-word}
.chat-item-meta{font-size:11px;color:var(--dim);flex:none}
</style>
</head>
<body>

<div id="app"></div>

<div class="overlay" id="overlay">
  <div class="sheet">
    <h3>Заявка на амнистию</h3>
    <p id="sheetChat"></p>
    <textarea id="amnestyText" placeholder="Опишите, почему вас стоит разбанить..."></textarea>
    <button class="btn accent" id="sendAmnesty">Отправить заявку</button>
    <button class="btn" id="cancelAmnesty">Отмена</button>
  </div>
</div>

<script>
const tg = window.Telegram && window.Telegram.WebApp;
if (tg) { tg.ready(); tg.expand(); tg.setHeaderColor("#0A0A0B"); tg.setBackgroundColor("#0A0A0B"); }

function decodePayload(){
  const m = location.hash.match(/[#&]d=([^&]+)/);
  if(!m) return null;
  let b64 = m[1].replace(/-/g,"+").replace(/_/g,"/");
  while(b64.length % 4) b64 += "=";
  try{
    const bytes = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
    return JSON.parse(new TextDecoder().decode(bytes));
  }catch(e){ return null; }
}
function fmtDur(s){
  s = s|0;
  const h = Math.floor(s/3600), m = Math.floor(s%3600/60);
  if(!h && !m) return "<1м";
  if(!h) return m+"м";
  return h+"ч "+m+"м";
}
function esc(t){const d=document.createElement("div");d.textContent=t??"";return d.innerHTML;}

const data = decodePayload();
const app = document.getElementById("app");
if(!data){
  app.innerHTML = '<div class="err">Не удалось загрузить данные.<br>Откройте профиль через кнопку в боте (/start).</div>';
} else {
  render(data);
}

function render(d){
  const totalWarns = (d.w||[]).reduce((a,x)=>a+x.n,0);
  const bansCount = (d.b||[]).length;

  let tickerDot = "dot", tickerText = "статус: чисто";
  if(bansCount || d.ns){ tickerDot = "dot bad"; tickerText = "статус: обнаружены блокировки"; }
  else if(totalWarns){ tickerDot = "dot warn"; tickerText = "статус: есть предупреждения"; }

  const adminTab = d.admin ? `<button class="tab" data-t="admin">Админка</button>` : "";
  const adminSec = d.admin ? `<div class="section" id="sec-admin">${renderAdmin(d)}</div>` : "";

  app.innerHTML = `
    <div class="ticker"><span class="${tickerDot}"></span>${tickerText}<span class="cur mono" style="margin-left:auto">#${d.u}</span></div>

    <div class="file-head">
      <div class="file-id mono">ДОСЬЕ УЧАСТНИКА</div>
      <div class="file-name">${esc(d.n)}</div>
    </div>

    <div class="section active" id="sec-status">${renderStatus(d)}</div>
    <div class="section" id="sec-bans">${renderBans(d)}</div>
    <div class="section" id="sec-ns">${renderNightmareSpire(d)}</div>
    <div class="section" id="sec-twitch">${renderTwitch(d)}</div>
    ${adminSec}

    <div class="tabs">
      <button class="tab active" data-t="status">Статус</button>
      <button class="tab" data-t="bans">Баны</button>
      <button class="tab" data-t="ns">NMS</button>
      <button class="tab" data-t="twitch">Twitch</button>
      ${adminTab}
    </div>`;

  document.querySelectorAll(".tab").forEach(b=>b.addEventListener("click",()=>{
    document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
    document.querySelectorAll(".section").forEach(x=>x.classList.remove("active"));
    b.classList.add("active");
    document.getElementById("sec-"+b.dataset.t).classList.add("active");
  }));

  bindAdmin();

  document.querySelectorAll("[data-amnesty]").forEach(b=>b.addEventListener("click",()=>openAmnesty(b.dataset.amnesty,b.dataset.chat)));
  const lb = document.getElementById("linkTwitch");
  if(lb) lb.addEventListener("click",()=>{ if(tg && d.lu) tg.openLink(d.lu); else if(d.lu) location.href=d.lu; });
}

function renderStatus(d){
  const addBtn = d.bot ? `<a class="btn" style="text-decoration:none;text-align:center" href="https://t.me/${esc(d.bot)}?startgroup=true">+ Добавить бота в свою группу</a>` : "";

  if(!d.w || !d.w.length){
    return `<div class="empty"><span class="big">Нет активности</span><span class="sub">Вы пока не состоите в чатах с ботом</span></div>${addBtn}`;
  }
  const rows = d.w.map(w=>{
    let segs = "";
    for(let i=0;i<w.m;i++) segs += `<div class="seg ${i<w.n?"on":""}"></div>`;
    const msgs = (w.msgs!=null) ? `<span class="row-val mono">${w.msgs} сообщ.</span>` : "";
    const ownerBadge = w.owner ? `<span class="owner-badge">владелец</span>` : "";
    const manageBtn = w.owner ? `<button class="btn" style="margin-top:10px" data-open-owner="${w.id}">Настройки и права</button>` : "";
    return `<div class="row">
      <div class="row-top"><div class="row-label">${esc(w.c)} ${ownerBadge}</div>${msgs}</div>
      <div class="gauge"><div class="gauge-track">${segs}</div><div class="gauge-num">${w.n}/${w.m}</div></div>
      ${w.n>0 ? `<div class="row-note">При ${w.m} предупреждениях следует блокировка</div>` : `<div class="row-note">Предупреждений нет</div>`}
      ${manageBtn}
    </div>`;
  }).join("");
  return `<div class="manifest">${rows}</div>${addBtn}`;
}

function renderBans(d){
  if(!d.b || !d.b.length){
    return `<div class="empty"><span class="big">Блокировок нет</span><span class="sub">Активных банов в чатах не найдено</span></div>`;
  }
  const rows = d.b.map(b=>{
    const pct = Math.min(100, Math.round(b.days / b.wait * 100));
    let action;
    if(b.req){
      action = `<span class="stamp pending">заявка на рассмотрении</span>`;
    } else if(b.days >= b.wait){
      action = `<button class="btn accent" data-amnesty="${b.id}" data-chat="${esc(b.c)}">Подать заявку на амнистию</button>`;
    } else {
      const left = Math.max(0,(b.wait-b.days)).toFixed(1);
      action = `<div class="bar"><div class="bar-fill" style="width:${pct}%"></div></div>
                <div class="bar-note">Заявка станет доступна через ${left} дн.</div>`;
    }
    return `<div class="row">
      <div class="row-top"><div class="row-label">${esc(b.c)}</div><div class="row-val">${esc(b.dt)}</div></div>
      <div class="row-note">Причина: <b>${esc(b.r)}</b> · прошло <b>${b.days}</b> из ${b.wait} дн.</div>
      <div class="stamp">заблокирован</div>
      ${action}
    </div>`;
  }).join("");
  return `<div class="manifest">${rows}</div>`;
}

function renderNightmareSpire(d){
  if(!d.ns){
    return `<div class="empty"><span class="big">Блокировок нет</span><span class="sub">Доступ к NightmareSpire не ограничен</span></div>`;
  }
  const until = d.ns.permanent ? "бессрочно" : esc(d.ns.until);
  return `<div class="manifest"><div class="row">
    <div class="row-top"><div class="row-label">Игровой аккаунт</div></div>
    <div class="row-note">Причина: <b>${esc(d.ns.reason)}</b>${d.ns.since ? ` · с ${esc(d.ns.since)}` : ""} · до <b>${until}</b></div>
    <div class="stamp">заблокирован</div>
  </div></div>`;
}

function renderTwitch(d){
  const channels = d.tw_channels || [];
  let channelBlock;
  if(channels.length){
    const list = channels.map(c=>`<div class="row"><div class="row-top"><div class="row-label">twitch.tv/${esc(c)}</div><a class="row-val" style="color:var(--twitch);text-decoration:none" href="https://twitch.tv/${esc(c)}" target="_blank">открыть →</a></div></div>`).join("");
    channelBlock = `<div class="row-top" style="margin-bottom:2px"><div class="row-label">Каналы для просмотра</div></div><div class="manifest">${list}</div>`;
  } else {
    channelBlock = `<div class="empty"><span class="big">Пока нет интеграции</span><span class="sub">Каналы для просмотра ещё не добавлены</span></div>`;
  }

  const dropsCard = `
    <div class="row-top" style="margin-top:18px"><div class="row-label">Как получить дропсы</div></div>
    <div class="row-note">Награды начисляются по количеству часов, проведённых на трансляции.</div>
    <div class="steps">
      <div class="step"><div class="step-n mono">01</div><div class="step-t">Напишите <code>!регистрация</code> в чате трансляции — начнётся учёт времени.</div></div>
      <div class="step"><div class="step-n mono">02</div><div class="step-t">Смотрите стримы. Время считается, пока вы в чате трансляции.</div></div>
      <div class="step"><div class="step-n mono">03</div><div class="step-t">Дропсы начисляются по мере накопления часов из статистики выше.</div></div>
    </div>`;

  if(!d.t){
    const btn = d.lu ? `<button class="btn tw" id="linkTwitch">Привязать Twitch</button>` : "";
    return `<div class="empty"><span class="big">Twitch не привязан</span><span class="sub">Привяжите аккаунт для учёта времени просмотра</span></div>${btn}
      <div style="margin-top:18px"></div>${channelBlock}`;
  }

  const maxSec = Math.max(1, ...(d.t.d||[]).map(x=>x[1]));
  const days = (d.t.d||[]).map(x=>{
    const date = x[0].slice(5).split("-").reverse().join(".");
    return `<div class="day-row">
      <div class="day-date">${date}</div>
      <div class="day-bar"><div class="day-fill" style="width:${Math.round(x[1]/maxSec*100)}%"></div></div>
      <div class="day-val">${fmtDur(x[1])}</div>
    </div>`;
  }).join("");

  return `
    <div class="tw-readout">
      <div class="tw-num">${fmtDur(d.t.s)}</div>
      <div class="tw-cap">суммарно в чате · ${esc(d.t.l)}</div>
    </div>
    ${days || `<div class="row-note">Пока нет данных по дням.</div>`}
    ${channelBlock}
    ${dropsCard}`;
}

function renderManagePanel(chats, perms, plabels, isAdmin){
  return (chats||[]).length
    ? chats.map(ch=>{
        const mods = ch.mods || [];
        const modIds = mods.map(m=>String(m.id));
        const modsHtml = mods.length
          ? mods.map(m=>{
              const toggles = perms.map(p=>{
                const on = (m.perms||[]).includes(p);
                return `<button class="perm ${on?"on":""}" data-toggle data-chat="${ch.id}" data-uid="${m.id}" data-perm="${p}">${esc(plabels[p]||p)}</button>`;
              }).join("");
              return `<div class="mod-box">
                <div class="row-top"><div class="row-label mono">${esc(modLabel(ch, m.id))}</div><button class="mini-btn" data-delmod data-chat="${ch.id}" data-uid="${m.id}">убрать</button></div>
                <div class="perms">${toggles}</div>
              </div>`;
            }).join("")
          : `<div class="row-note">Модераторов нет.</div>`;

        const delChat = isAdmin ? `<button class="mini-btn" data-delchat data-chat="${ch.id}">отключить</button>` : "";

        const candidates = (ch.members||[]).filter(m=>!modIds.includes(String(m.id)));
        const pickList = candidates.length
          ? `<div class="pick-list">${candidates.map(m=>`<button class="pick" data-pickmod data-chat="${ch.id}" data-uid="${m.id}">${esc(m.label)}</button>`).join("")}</div>`
          : `<div class="row-note">Нет кандидатов. Участник должен написать в чате, чтобы появиться в списке.</div>`;

        return `<div class="row" data-chatblock="${ch.id}">
          <div class="row-top"><div class="row-label">${esc(ch.title)}</div>${delChat}</div>
          <div class="row-note mono">${ch.id}</div>
          ${modsHtml}
          <button class="btn accent" data-save data-chat="${ch.id}">Сохранить права</button>
          <div class="sub-h">Добавить модератора</div>
          ${pickList}
          <div class="mod-line" style="margin-top:8px">
            <input class="inp" id="mod-${ch.id}" placeholder="или @username / ID">
            <button class="mini-btn" data-addmod data-chat="${ch.id}">+</button>
          </div>
          ${renderChatSettings(ch)}
        </div>`;
      }).join("")
    : `<div class="row-note">Чатов нет.</div>`;
}

function renderChatSettings(ch){
  const s = ch.settings || {};
  const am = s.automod || {};
  const amLabels = (data && data.amlabels) || {};
  const amActions = (data && data.amactions) || {};

  const amToggles = Object.keys(amLabels).map(k=>{
    const on = !!am[k];
    return `<button class="perm ${on?"on":""}" data-amtoggle data-chat="${ch.id}" data-key="${k}">${esc(amLabels[k])}</button>`;
  }).join("");

  const actionBtns = Object.keys(amActions).map(k=>{
    const on = (s.automod_action||"warn")===k;
    return `<button class="perm ${on?"on":""}" data-amaction data-chat="${ch.id}" data-act="${k}">${esc(amActions[k])}</button>`;
  }).join("");

  return `
    <div class="sub-h">Приветствие</div>
    <button class="perm ${s.welcome_enabled?"on":""}" data-wtoggle data-chat="${ch.id}" style="margin-bottom:8px">${s.welcome_enabled?"Включено":"Выключено"}</button>
    <textarea class="inp" id="wtext-${ch.id}" placeholder="Текст приветствия. {mention} — упоминание новичка" style="min-height:64px;margin-bottom:8px">${esc(s.welcome_text||"")}</textarea>
    <input class="inp" id="wbtn-${ch.id}" placeholder="Текст кнопки" value="${esc(s.welcome_button||"Прочитал правила")}" style="margin-bottom:8px">
    <input class="inp" id="wmute-${ch.id}" inputmode="numeric" placeholder="Секунд до кнопки" value="${s.welcome_mute_seconds!=null?s.welcome_mute_seconds:60}" style="margin-bottom:8px">
    <input class="inp" id="wthread-${ch.id}" inputmode="numeric" placeholder="ID ветки для приветствия (пусто = General)" value="${s.welcome_thread_id!=null?s.welcome_thread_id:''}" style="margin-bottom:8px">
    <div class="row-note">Узнать ID ветки: команда <code>!chatid</code> прямо в нужной ветке.</div>

    <div class="sub-h">Уведомления бота</div>
    <input class="inp" id="nthread-${ch.id}" inputmode="numeric" placeholder="ID ветки для уведомлений (пусто = General)" value="${s.notify_thread_id!=null?s.notify_thread_id:''}" style="margin-bottom:8px">
    <div class="row-note">Куда слать автовыдачу варнов/банов, антирейд и другие оповещения бота — например в отдельную «служебную» ветку.</div>

    <div class="sub-h">Автомодерация</div>
    <button class="perm ${s.automod_enabled?"on":""}" data-amenabled data-chat="${ch.id}" style="margin-bottom:8px">${s.automod_enabled?"Включена":"Выключена"}</button>
    <div class="perms">${amToggles}</div>
    <div class="sub-h" style="margin-top:12px">Действие при нарушении</div>
    <div class="perms">${actionBtns}</div>
    <input class="inp" id="ammute-${ch.id}" inputmode="numeric" placeholder="Секунд мута (для действия «мут»)" value="${s.automod_mute_seconds!=null?s.automod_mute_seconds:300}" style="margin-top:8px">

    <button class="btn accent" data-savesettings data-chat="${ch.id}" style="margin-top:12px">Сохранить настройки</button>`;
}

function modLabel(ch, uid){
  const m = (ch.members||[]).find(x=>String(x.id)===String(uid));
  return m ? m.label : String(uid);
}

function renderAdmin(d){
  const a = d.admin;

  const chans = (a.tw||[]).length
    ? a.tw.map(c=>`<div class="row"><div class="row-top"><div class="row-label mono">${esc(c)}</div><button class="mini-btn" data-deltwitch data-val="${esc(c)}">удалить</button></div></div>`).join("")
    : `<div class="row-note">Каналов пока нет.</div>`;

  const chatList = (a.chats||[]).length
    ? a.chats.map(ch=>{
        const modCount = (ch.mods||[]).length;
        return `<button class="chat-item" data-open-owner="${ch.id}">
          <div class="chat-item-name">${esc(ch.title)}</div>
          <div class="chat-item-meta mono">${modCount} мод. ›</div>
        </button>`;
      }).join("")
    : `<div class="row-note">Чатов пока нет. Добавьте бота в группу.</div>`;

  return `
    <div class="row-top" style="margin-bottom:2px"><div class="row-label">Twitch-каналы</div></div>
    <div class="manifest">${chans}</div>
    <div class="mod-line" style="margin-top:12px">
      <input class="inp" id="new-twitch" placeholder="twitch.tv/канал или логин">
      <button class="btn accent" style="margin:0;width:auto;padding:10px 14px" data-addtwitch>Добавить</button>
    </div>

    <div class="row-top" style="margin:22px 0 10px"><div class="row-label">Чаты и модераторы</div></div>
    ${chatList}`;
}

let pendingPerms = {};

function collectMod(chatId, uid){
  const key = chatId+":"+uid;
  if(!pendingPerms[key]){
    const active = [];
    document.querySelectorAll(`[data-toggle][data-chat="${chatId}"][data-uid="${uid}"].on`).forEach(b=>active.push(b.dataset.perm));
    pendingPerms[key] = active;
  }
  return pendingPerms[key];
}

function bindAdmin(){
  document.querySelectorAll("[data-toggle]").forEach(el=>{
    if(el._bound) return; el._bound = true;
    el.addEventListener("click",()=>{
      const chatId = el.dataset.chat, uid = el.dataset.uid, perm = el.dataset.perm;
      const arr = collectMod(chatId, uid);
      const idx = arr.indexOf(perm);
      if(idx>=0){ arr.splice(idx,1); el.classList.remove("on"); }
      else { arr.push(perm); el.classList.add("on"); }
    });
  });

  document.querySelectorAll("[data-save]").forEach(el=>{
    if(el._bound) return; el._bound = true;
    el.addEventListener("click",()=>{
      const chatId = el.dataset.chat;
      const changes = {};
      Object.keys(pendingPerms).forEach(key=>{
        const [cid, uid] = key.split(":");
        if(cid===String(chatId)) changes[uid] = pendingPerms[key];
      });
      if(tg) tg.sendData(JSON.stringify({action:"save_perms", chat_id:chatId, changes:changes}));
    });
  });

  document.querySelectorAll("[data-addmod]").forEach(el=>{
    if(el._bound) return; el._bound = true;
    el.addEventListener("click",()=>{
      const chatId = el.dataset.chat;
      const value = document.getElementById("mod-"+chatId).value.trim();
      if(!value) return;
      const action = el.closest("[data-ownerpanel]") ? "owner_add_mod" : "admin_add_mod";
      if(tg) tg.sendData(JSON.stringify({action:action, chat_id:chatId, value:value}));
    });
  });

  document.querySelectorAll("[data-pickmod]").forEach(el=>{
    if(el._bound) return; el._bound = true;
    el.addEventListener("click",()=>{
      const action = el.closest("[data-ownerpanel]") ? "owner_add_mod" : "admin_add_mod";
      if(tg) tg.sendData(JSON.stringify({action:action, chat_id:el.dataset.chat, value:el.dataset.uid}));
    });
  });

  document.querySelectorAll("[data-delmod]").forEach(el=>{
    if(el._bound) return; el._bound = true;
    el.addEventListener("click",()=>{
      const action = el.closest("[data-ownerpanel]") ? "owner_del_mod" : "admin_del_mod";
      if(tg) tg.sendData(JSON.stringify({action:action, chat_id:el.dataset.chat, value:el.dataset.uid}));
    });
  });

  document.querySelectorAll("[data-deltwitch]").forEach(el=>{
    if(el._bound) return; el._bound = true;
    el.addEventListener("click",()=>{ if(tg) tg.sendData(JSON.stringify({action:"admin_del_twitch", value:el.dataset.val})); });
  });
  document.querySelectorAll("[data-addtwitch]").forEach(el=>{
    if(el._bound) return; el._bound = true;
    el.addEventListener("click",()=>{
      const value = document.getElementById("new-twitch").value.trim();
      if(value && tg) tg.sendData(JSON.stringify({action:"admin_add_twitch", value:value}));
    });
  });
  document.querySelectorAll("[data-delchat]").forEach(el=>{
    if(el._bound) return; el._bound = true;
    el.addEventListener("click",()=>{ if(tg) tg.sendData(JSON.stringify({action:"admin_del_chat", chat_id:el.dataset.chat})); });
  });

  document.querySelectorAll("[data-open-owner]").forEach(el=>{
    if(el._bound) return; el._bound = true;
    el.addEventListener("click",()=>openOwnerPanel(el.dataset.openOwner));
  });

  document.querySelectorAll("[data-wtoggle]").forEach(el=>{
    if(el._bound) return; el._bound = true;
    el.addEventListener("click",()=>{
      const on = el.classList.toggle("on");
      el.textContent = on ? "Включено" : "Выключено";
    });
  });
  document.querySelectorAll("[data-amenabled]").forEach(el=>{
    if(el._bound) return; el._bound = true;
    el.addEventListener("click",()=>{
      const on = el.classList.toggle("on");
      el.textContent = on ? "Включена" : "Выключена";
    });
  });
  document.querySelectorAll("[data-amtoggle]").forEach(el=>{
    if(el._bound) return; el._bound = true;
    el.addEventListener("click",()=>el.classList.toggle("on"));
  });
  document.querySelectorAll("[data-amaction]").forEach(el=>{
    if(el._bound) return; el._bound = true;
    el.addEventListener("click",()=>{
      const chatId = el.dataset.chat;
      document.querySelectorAll(`[data-amaction][data-chat="${chatId}"]`).forEach(b=>b.classList.remove("on"));
      el.classList.add("on");
    });
  });
  document.querySelectorAll("[data-savesettings]").forEach(el=>{
    if(el._bound) return; el._bound = true;
    el.addEventListener("click",()=>{
      const chatId = el.dataset.chat;
      const automod = {};
      document.querySelectorAll(`[data-amtoggle][data-chat="${chatId}"]`).forEach(b=>{
        automod[b.dataset.key] = b.classList.contains("on");
      });
      let action = "warn";
      const activeAction = document.querySelector(`[data-amaction][data-chat="${chatId}"].on`);
      if(activeAction) action = activeAction.dataset.act;

      const settings = {
        welcome_enabled: document.querySelector(`[data-wtoggle][data-chat="${chatId}"]`).classList.contains("on"),
        welcome_text: (document.getElementById("wtext-"+chatId).value||"").trim(),
        welcome_button: (document.getElementById("wbtn-"+chatId).value||"").trim(),
        welcome_mute_seconds: parseInt(document.getElementById("wmute-"+chatId).value)||0,
        welcome_thread_id: (document.getElementById("wthread-"+chatId).value||"").trim(),
        notify_thread_id: (document.getElementById("nthread-"+chatId).value||"").trim(),
        automod_enabled: document.querySelector(`[data-amenabled][data-chat="${chatId}"]`).classList.contains("on"),
        automod: automod,
        automod_action: action,
        automod_mute_seconds: parseInt(document.getElementById("ammute-"+chatId).value)||0,
      };
      if(tg) tg.sendData(JSON.stringify({action:"save_settings", chat_id:chatId, settings:settings}));
    });
  });
}

let amnestyChatId = null;
const overlay = document.getElementById("overlay");
function openAmnesty(chatId, chatName){
  amnestyChatId = chatId;
  document.getElementById("sheetChat").textContent = "Чат: " + chatName + ". Опишите одним сообщением, почему вас стоит разбанить.";
  document.getElementById("amnestyText").value = "";
  overlay.classList.add("open");
}
document.getElementById("cancelAmnesty").addEventListener("click",()=>overlay.classList.remove("open"));
document.getElementById("sendAmnesty").addEventListener("click",()=>{
  const text = document.getElementById("amnestyText").value.trim();
  if(!text){ document.getElementById("amnestyText").focus(); return; }
  if(tg){
    tg.sendData(JSON.stringify({action:"amnesty", chat_id:amnestyChatId, text:text}));
  } else {
    alert("Откройте приложение через Telegram.");
  }
});

function openOwnerPanel(chatId){
  if(!data) return;
  let ch = null;
  let isAdminPanel = false;

  if(data.admin){
    ch = (data.admin.chats||[]).find(c=>String(c.id)===String(chatId));
    if(ch) isAdminPanel = true;
  }
  if(!ch){
    ch = (data.owned||[]).find(c=>String(c.id)===String(chatId));
  }
  if(!ch) return;

  const usablePerms = isAdminPanel ? (data.perms||[]) : (data.owner_perms||[]);

  const panel = document.getElementById("ownerPanel");
  panel.innerHTML = renderManagePanel([ch], usablePerms, data.plabels||{}, isAdminPanel);
  panel.setAttribute("data-ownerpanel","1");

  document.getElementById("ownerOverlay").classList.add("open");
  bindAdmin();
}
document.addEventListener("click",(e)=>{
  if(e.target.closest("#closeOwner")){
    document.getElementById("ownerOverlay").classList.remove("open");
    return;
  }
  if(e.target.id==="ownerOverlay"){
    document.getElementById("ownerOverlay").classList.remove("open");
  }
});
</script>

<div class="overlay" id="ownerOverlay">
  <div class="sheet" style="max-height:82vh;overflow-y:auto">
    <h3>Управление группой</h3>
    <p>Назначайте модераторов и выдавайте им права. Не забудьте «Сохранить права».</p>
    <div id="ownerPanel"></div>
    <button class="btn" id="closeOwner" style="margin-top:14px">Закрыть</button>
  </div>
</div>

</body>
</html>
