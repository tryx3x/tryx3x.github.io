<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#090b0f">
<title>Гримуар Синергий · Бронная мастерская</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.5.0/lz-string.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Lora:ital,wght@0,400;0,500;1,400;1,500&family=JetBrains+Mono:wght@400;600&display=swap');

:root {
  --bg: #090b0f;
  --bg-2: #0f1319;
  --panel: #141a22;
  --panel-hi: #1b232e;
  --text: #cdd7de;
  --muted: #7f8b96;
  --faint: #48525c;
  --rule: #232d38;
  --rule-soft: #1b232c;
  --acc: #4aa8c9;
  --acc-soft: #8fd3e8;

  --arch-phys: #c1502e;
  --arch-mag: #8b6fea;
  --arch-crit: #b9cf45;
  --arch-hybrid: #c9a227;
  --arch-vit: #c04a66;
  --arch-support: #3fa79b;
  --arch-locked: #4d4a54;

  --r: 4px;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }

body {
  background:
    radial-gradient(ellipse 1000px 460px at 15% -8%, rgba(74,168,201,0.12), transparent 62%),
    radial-gradient(ellipse 800px 400px at 90% -4%, rgba(50,90,140,0.08), transparent 60%),
    linear-gradient(180deg, var(--bg-2) 0%, var(--bg) 340px);
  background-color: var(--bg);
  color: var(--text);
  font-family: 'Lora', Georgia, serif;
  min-height: 100vh;
}

/* ── Частицы (угли / изморозь) ────────────────────────────────────── */
.motes { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0; }
.mote {
  --drift: 0px;
  position: absolute; width: 3px; height: 3px; border-radius: 50%;
  background: #8fd3e8; opacity: 0; filter: blur(.5px);
}
.mote.rise { bottom: -12px; animation: rise linear infinite; }
.mote.drift-down { top: -12px; animation: drift-down linear infinite; }
@keyframes rise {
  0%   { transform: translate(0,0); opacity: 0; }
  8%   { opacity: .5; }
  92%  { opacity: .12; }
  100% { transform: translate(var(--drift), -105vh); opacity: 0; }
}
@keyframes drift-down {
  0%   { transform: translate(0,0); opacity: 0; }
  10%  { opacity: .45; }
  90%  { opacity: .1; }
  100% { transform: translate(var(--drift), 105vh); opacity: 0; }
}
@media (prefers-reduced-motion: reduce) { .mote { display: none; } }

.wrap { position: relative; z-index: 1; max-width: 1180px; margin: 0 auto; padding: 44px 20px 90px; }

/* ── Шапка ─────────────────────────────────────────────────────────── */
header.top { text-align: center; margin-bottom: 30px; }
.eyebrow {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; letter-spacing: .3em; text-transform: uppercase;
  color: var(--faint); margin-bottom: 16px;
}
.sigil { width: 48px; height: 48px; margin: 0 auto 10px; opacity: .85; }
.sigil svg { width: 100%; height: 100%; fill: none; stroke: var(--acc); stroke-width: 2; }
h1.title {
  font-family: 'Cinzel', serif; font-weight: 700;
  font-size: clamp(30px, 5.4vw, 48px);
  letter-spacing: .015em; margin: 0 0 6px;
  background: linear-gradient(180deg, #e2eef5 0%, #9cc4d6 58%, #5b7f92 100%);
  -webkit-background-clip: text; background-clip: text; color: transparent;
}
.title-rule { width: 220px; height: 14px; margin: 2px auto 14px; opacity: .7; }
.title-rule svg { width: 100%; height: 100%; }
.subtitle {
  color: var(--muted); font-style: italic; font-size: 15px;
  max-width: 580px; margin: 0 auto 24px; line-height: 1.55;
}

.progress-pill {
  display: inline-flex; align-items: center; gap: 14px;
  font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--muted);
  border: 1px solid var(--rule); border-radius: 999px; padding: 9px 20px;
  background: rgba(255,255,255,.02);
}
.progress-pill b { color: var(--text); font-weight: 600; }
.pb-track { width: 150px; height: 5px; border-radius: 3px; background: var(--rule-soft); overflow: hidden; position: relative; }
.pb-fill {
  height: 100%; border-radius: 3px;
  background: linear-gradient(90deg, var(--acc), var(--acc-soft));
  box-shadow: 0 0 8px var(--acc);
  transition: width .6s cubic-bezier(.2,.8,.2,1);
}

/* ── Фильтры ───────────────────────────────────────────────────────── */
.filters {
  position: sticky; top: 0; z-index: 6;
  background: color-mix(in srgb, var(--bg) 86%, transparent);
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--rule);
  padding: 14px 0 15px; margin-bottom: 28px;
}
.filters-inner { display: flex; flex-wrap: wrap; gap: 10px 14px; align-items: center; justify-content: center; }
.search-box {
  flex: 1 1 230px; max-width: 330px;
  background: var(--panel); border: 1px solid var(--rule); border-radius: var(--r);
  padding: 10px 14px; color: var(--text); font-family: 'Lora', serif; font-size: 14px;
  transition: border-color .15s;
}
.search-box::placeholder { color: var(--faint); }
.search-box:focus { outline: none; border-color: var(--acc); }
.search-box:focus-visible { outline: 2px solid var(--acc); outline-offset: 1px; }

.chip-group { display: flex; gap: 6px; flex-wrap: wrap; }
.chip {
  font-family: 'JetBrains Mono', monospace; font-size: 12px;
  padding: 7px 12px; border-radius: var(--r);
  border: 1px solid var(--rule); background: var(--panel); color: var(--muted);
  cursor: pointer; user-select: none;
  display: inline-flex; align-items: center; gap: 6px;
  transition: border-color .15s, color .15s, background .15s, transform .1s;
}
.chip:hover { border-color: var(--faint); color: var(--text); }
.chip:active { transform: scale(.97); }
.chip.active {
  color: var(--bg); background: var(--chip-c, var(--acc));
  border-color: var(--chip-c, var(--acc)); font-weight: 600;
}
.chip svg { width: 12px; height: 12px; fill: none; stroke: currentColor; stroke-width: 1.7; }

/* ── Сетка ─────────────────────────────────────────────────────────── */
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }

.card {
  position: relative;
  background: linear-gradient(160deg, var(--panel-hi) 0%, var(--panel) 46%);
  border: 1px solid var(--rule);
  border-left: 3px solid var(--card-acc, var(--rule));
  border-radius: var(--r);
  padding: 17px 17px 15px;
  opacity: 0; transform: translateY(10px);
  animation: card-in .45s ease forwards;
  animation-delay: var(--stagger, 0s);
  transition: transform .16s ease, box-shadow .16s ease, border-color .16s ease;
}
@keyframes card-in { to { opacity: 1; transform: translateY(0); } }
@media (prefers-reduced-motion: reduce) {
  .card { animation: none; opacity: 1; transform: none; }
}
.card.unlocked:hover {
  transform: translateY(-3px);
  border-color: color-mix(in srgb, var(--card-acc) 55%, var(--rule));
  box-shadow:
    0 14px 30px -14px rgba(0,0,0,.65),
    0 0 22px -12px var(--card-acc);
}
.card.locked {
  border-left-color: var(--arch-locked);
  background: var(--bg-2);
}
/* Резервируем место под печать, чтобы она не наезжала на бейдж */
.card.locked .card-head { padding-right: 42px; }

.card-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.arch-badge {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: 'JetBrains Mono', monospace; font-size: 10.5px;
  letter-spacing: .08em; text-transform: uppercase;
  color: var(--card-acc, var(--muted));
}
.arch-badge svg { width: 13px; height: 13px; fill: none; stroke: currentColor; stroke-width: 1.6; }
.ing-count {
  font-family: 'JetBrains Mono', monospace; font-size: 10.5px; color: var(--faint);
  border: 1px solid var(--rule); border-radius: 999px; padding: 2px 9px;
  white-space: nowrap;
}

.card-title {
  font-family: 'Cinzel', serif; font-weight: 600; font-size: 17.5px;
  color: var(--text); margin: 0 0 11px; line-height: 1.28;
}
.card.locked .card-title { color: var(--faint); font-style: italic; font-weight: 500; }

.ing-list { list-style: none; margin: 0 0 12px; padding: 0; font-size: 12.5px; color: var(--muted); display: flex; flex-direction: column; gap: 3px; }
.ing-list li::before { content: "◆ "; font-size: 8px; vertical-align: 1px; color: color-mix(in srgb, var(--card-acc) 65%, var(--faint)); }
.card.locked .ing-list li::before { color: var(--faint); }
.ing-list.blurred li { color: var(--faint); filter: blur(2.4px); user-select: none; }

.divider { border: none; border-top: 1px solid var(--rule-soft); margin: 11px 0; }

.sect-label {
  font-family: 'JetBrains Mono', monospace; font-size: 9.5px;
  letter-spacing: .12em; text-transform: uppercase;
  color: var(--faint); margin: 0 0 6px;
}
.num-chips { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 11px; }
.nchip {
  font-family: 'JetBrains Mono', monospace; font-size: 11px;
  border: 1px solid var(--rule); border-radius: 3px;
  padding: 3px 8px; color: var(--muted); background: rgba(255,255,255,.02);
}
.nchip b { color: var(--text); font-weight: 600; }
.nchip.good b { color: #8fbf6e; }
.nchip.bad b  { color: #c9705f; }

.stat-bars { display: flex; flex-direction: column; gap: 5px; margin-bottom: 4px; }
.sb-row { display: grid; grid-template-columns: 52px 1fr 34px; align-items: center; gap: 8px; font-family: 'JetBrains Mono', monospace; font-size: 11px; }
.sb-row .k { color: var(--faint); }
.sb-row .v { text-align: right; color: var(--text); }
.sb-row .v.neg { color: #c9705f; }
.sb-track { height: 4px; border-radius: 2px; background: var(--rule-soft); overflow: hidden; }
.sb-fill { height: 100%; border-radius: 2px; background: color-mix(in srgb, var(--card-acc) 80%, white 6%); }
.sb-fill.neg { background: #a05248; }

.note {
  font-style: italic; font-size: 12.5px; color: var(--muted); line-height: 1.55;
  margin: 0; border-left: 2px solid var(--rule-soft); padding-left: 10px;
}

.seal { position: absolute; top: 13px; right: 13px; width: 34px; height: 34px; }
.seal svg { width: 100%; height: 100%; }
.locked-hint {
  font-size: 11px; color: var(--faint); font-family: 'JetBrains Mono', monospace;
  text-align: center; margin: 8px 0 2px; letter-spacing: .06em;
}

.empty-state { grid-column: 1 / -1; text-align: center; padding: 70px 20px; color: var(--faint); font-style: italic; line-height: 1.7; }
.empty-state .big { font-family: 'Cinzel', serif; font-size: 19px; font-style: normal; color: var(--muted); margin-bottom: 8px; }

@media (max-width: 520px) {
  .wrap { padding: 26px 13px 64px; }
  .grid { grid-template-columns: 1fr; }
  .progress-pill { flex-wrap: wrap; justify-content: center; }
}
</style>
</head>
<body>

<div class="motes" id="motes"></div>

<div class="wrap">

  <header class="top">
    <div class="eyebrow">NightmareSpire · Бронное дело</div>
    <div class="sigil"><svg viewBox="0 0 48 48"><path d="M24 8 L38 13 V25 C38 33 32 38 24 41 C16 38 10 33 10 25 V13 Z"/><path d="M24 15 V33 M17 21 L31 21"/></svg></div>
    <h1 class="title">Гримуар Синергий</h1>
    <div class="title-rule">
      <svg viewBox="0 0 220 14" fill="none" stroke="var(--acc)" stroke-width="1">
        <path d="M4 7 H92 M128 7 H216" opacity=".55"/>
        <path d="M110 2 L115 7 L110 12 L105 7 Z"/>
        <circle cx="98" cy="7" r="1.6" fill="var(--acc)" stroke="none" opacity=".7"/>

    <p class="subtitle">Броня помнит каждый слой, из которого сложена. Рецепт раскрывается только тому броннику, кто хотя бы раз собрал его на наковальне собственными руками.</p>

  <div class="filters">

      <input type="text" class="search-box" id="search" placeholder="Поиск по открытым синергиям…" aria-label="Поиск">
      <div class="chip-group" id="count-filters"></div>
      <div class="chip-group" id="arch-filters"></div>

  </div>

  <div class="grid" id="grid"></div>

</div>

<script>
const SYNERGIES_DATA = [{"name":"Адамантиевого Дракона","archetype":"phys_tank","ingredients":["adamantium_ingot","dragon_scale"],"ingredient_count":2,"mult":0.22,"phys":28,"mag":2,"defect_mod":-12,"str":16,"agi":-8,"vit":12,"mp":0,"stamina":0,"mana":0,"circ":0,"note":"Чешуя на адамантии. Два самых упрямых материала в мире нашли общий язык — и этот язык говорит «нет» любому урону."},{"name":"Ангельская броня","archetype":"mag_tank","ingredients":["angel_feather","soft_leather"],"ingredient_count":2,"mult":0.08,"phys":-2,"mag":14,"defect_mod":0,"str":-2,"agi":6,"vit":2,"mp":10,"stamina":0,"mana":0,"circ":0,"note":"Перо не весит ничего, но защищает от чего угодно. Боги знают почему — ты нет"},{"name":"Белого Адаманта","archetype":"phys_tank","ingredients":["adamantium_ingot","white_splinter"],"ingredient_count":2,"mult":0.18,"phys":26,"mag":0,"defect_mod":-16,"str":14,"agi":-6,"vit":12,"mp":0,"stamina":0,"mana":0,"circ":0,"note":"Адамантий принял осколок голема без вопросов. Броня не знает что такое дефект — и не планирует узнавать"},{"name":"Белого Титана","archetype":"phys_tank","ingredients":["titanium_ingot","white_splinter"],"ingredient_count":2,"mult":0.14,"phys":18,"mag":0,"defect_mod":-12,"str":10,"agi":-12,"vit":8,"mp":0,"stamina":0,"mana":0,"circ":0,"note":"Осколок голема лёг на титан как родной. Оба упрямые, оба прочные, оба не любят магию — нашли общий язык"},{"name":"Бронзовая","archetype":"hybrid","ingredients":["copper_ingot","tin_ingot"],"ingredient_count":2,"mult":0.06,"phys":5,"mag":3,"defect_mod":0,"str":2,"agi":2,"vit":0,"mp":0,"stamina":0,"mana":0,"circ":0,"note":"Медь с оловом не поспорили — и вышло лучше чем каждый из них заслуживал"},{"name":"Владыки Пустоты","archetype":"mag_tank","ingredients":["chaos_void_hide","nuar_crystal"],"ingredient_count":2,"mult":0.2,"phys":-4,"mag":22,"defect_mod":0,"str":-4,"agi":0,"vit":4,"mp":14,"stamina":0,"mana":0,"circ":0,"note":"Кристалл и пустота — два зеркала друг для друга. Броня отражает магию обратно"},{ unt":6,"mult":0.4,"phys":42,"mag":8,"defect_mod":-15,"str":26,"agi":-12,"vit":18,"mp":0,"stamina":0,"mana":0,"circ":0,"note":"Если бог кузнецов существовал — он бы сделал именно это. Ты сделал. Выводы делай сам"},{"name":"Владыки Забвения","archetype":"vit_tank","ingredients":["adamantium_ingot","ancient_rune_leather","dragon_scale","nuber_scale","oblivion_dust","zerot_core"],"ingredient_count":6,"mult":0.44,"phys":34,"mag":12,"defect_mod":16,"str":18,"agi":-10,"vit":30,"mp":0,"stamina":26,"mana":0,"circ":0,"note":"Ядро хищника, прах забвения, две чешуи и адамантий. Броня помнит смерть богов — и не боится своей"},{"name":"Конца Эпохи","archetype":"phys_tank","ingredients":["adamantium_ingot","ancient_rune_leather","chaos_void_hide","dragon_scale","meteorite_ingot","shadow_thread"],"ingredient_count":6,"mult":0.38,"phys":38,"mag":6,"defect_mod":8,"str":24,"agi":-10,"vit":16,"mp":0,"stamina":0,"mana":0,"circ":0,"note":"Шесть материалов в одной броне — это уже не защита, это приговор. Чужой"},{"name":"Начала Всего","archetype":"hybrid","ingredients":["copper_ingot","hard_leather","iron_ingot","soft_leather","spiderweb_leather","swamp_slime_membrane"],"ingredient_count":6,"mult":0.1,"phys":6,"mag":4,"defect_mod":-30,"str":4,"agi":4,"vit":4,"mp":4,"stamina":0,"mana":0,"circ":0,"note":"Шесть простейших материалов. Смешно? Единственный рецепт без дефектов. Думай"},{"name":"Последнего Рассвета","archetype":"evasion","ingredients":["ancient_rune_leather","chaos_void_hide","charred_bone_leather","infernal_hide","shadow_thread","void_shard"],"ingredient_count":6,"mult":0.28,"phys":-8,"mag":12,"defect_mod":18,"str":0,"agi":22,"vit":-10,"mp":10,"stamina":0,"mana":0,"circ":0,"note":"Шесть тёмных материалов. Броня поглощает свет вокруг владельца — удобно для засады"},{"name":"Пяти Стихий Бездны","archetype":"support","ingredients":["abyss_spark","ancient_rune_leather","corruption_seed","crystal_membrane","oblivion_dust","zerot_core"],"ingredient_count":6,"mult":0.42,"phys":8,"mag":30,"defect_mod":18,"str":2,"agi":0,"vit":14,"mp":22,"stamina":0,"mana":24,"circ":12,"note":"Все тайны Цитадели и ядро древнего хищника в одной броне. Даже мастер не уверен, что именно сшил"}];
const MATERIAL_NAMES = {"iron_ingot":"Железный слиток","tin_ingot":"Оловянный слиток","copper_ingot":"Медный слиток","titanium_ingot":"Титановый слиток","damascus_ingot":"Дамасский слиток","meteorite_ingot":"Метеоритный слиток","mythril_ingot":"Мифриловый слиток","adamantium_ingot":"Адамантиевый слиток","silver_ingot":"Серебряный слиток","gold_ingot":"Золотой слиток","platinum_ingot":"Платиновый слиток","white_splinter":"Белый металлический осколок","zarkat_shard":"Осколок проклятого клинка","nuar_crystal":"Осколок чёрного кристалла","nuber_scale":"Почерневшая чешуя","murr_tail":"Хвост Скверны","zerot_core":"Ядро Древнего Хищника","bone":"Кость","bone_plate":"Костяная пластина","broken_horn":"Сломанный рог","void_shard":"Осколок пустоты","elemental_crystal":"Элементальный кристалл","dragon_scale":"Драконья чешуя","storm_feather":"Буревое перо","moonwolf_fur":"Лунный волчий мех","void_thread":"Нить пустоты","shadow_shard":"Осколок тени","shadow_thread":"Теневая нить","dark_silk":"Тёмный шёлк","spider_thread":"Паучья нить","angel_feather":"Ангельское перо","chaos_void_hide":"Шкура зверя пустоты","ancient_rune_leather":"Древняя руническая кожа","infernal_hide":"Инфернальная кожа","swamp_slime_membrane":"Слизистая мембрана","spiderweb_leather":"Паучья кожа","charred_bone_leather":"Обугленная кожа","bloodpetal_leather":"Кроваво-лепестковая кожа","crystal_membrane":"Кристаллическая мембрана","frozen_ghost_leather":"Призрачная эссенция","soft_leather":"Мягкая кожа","hard_leather":"Твёрдая кожа","reinforced_leather":"Укреплённая кожа","abyss_spark":"Искра Бездны","oblivion_dust":"Прах Забвения","corruption_seed":"Семя Порчи"};
</script>

<script>
"use strict";

const ARCHETYPES = {
  phys_tank: { label: "Физ. танк",  color: "var(--arch-phys)",
    icon: '<path d="M8 1 L14 3.5 V8 C14 11.5 11.5 14 8 15 C4.5 14 2 11.5 2 8 V3.5 Z"/>' },
  mag_tank:  { label: "Маг. танк",  color: "var(--arch-mag)",
    icon: '<path d="M8 1 L9.5 6 L14 8 L9.5 10 L8 15 L6.5 10 L2 8 L6.5 6 Z"/>' },
  evasion:   { label: "Уклонение",  color: "var(--arch-crit)",
    icon: '<path d="M9 1 L4 9 L7.5 9 L6 15 L12 6.5 L8.5 6.5 Z"/>' },
  hybrid:    { label: "Гибрид",     color: "var(--arch-hybrid)",
    icon: '<path d="M8 1 L14 4.5 V11.5 L8 15 L2 11.5 V4.5 Z"/>' },
  vit_tank:  { label: "Бастион",    color: "var(--arch-vit)",
    icon: '<path d="M8 14 C3 10 1 7 1 4.8 C1 2.8 2.6 1.5 4.3 1.5 C5.8 1.5 7 2.4 8 3.8 C9 2.4 10.2 1.5 11.7 1.5 C13.4 1.5 15 2.8 15 4.8 C15 7 13 10 8 14 Z"/>' },
  support:   { label: "Циркуляция", color: "var(--arch-support)",
    icon: '<path d="M2 8 C2 4.5 4.5 2 8 2 C11 2 13 4 13 6.5 C13 8.7 11.3 10 9.5 10 C7.9 10 6.8 9 6.8 7.6 C6.8 6.4 7.6 5.6 8.6 5.6"/>' },
};
const Q_ICON = '<circle cx="8" cy="8" r="6"/><path d="M6.2 6.4 C6.2 5.1 7 4.4 8.1 4.4 C9.2 4.4 10 5.1 10 6.1 C10 7.6 8.1 7.6 8.1 9.1 M8.1 11.4 L8.1 11.5"/>';
const STAT_MAX = 32;

/* Прогресс игрока:
   1) window.NIGHTMARE_DISCOVERED = [...]
   2) ?lz=<LZString.compressToEncodedURIComponent(JSON-массива имён)>
   3) ?discovered=Имя1,Имя2 */
function resolveDiscovered() {
  if (Array.isArray(window.NIGHTMARE_DISCOVERED)) return new Set(window.NIGHTMARE_DISCOVERED);
  const params = new URLSearchParams(location.search);
  const lz = params.get("lz");
  if (lz && typeof LZString !== "undefined") {
    try {
      const raw = LZString.decompressFromEncodedURIComponent(lz);
      const arr = JSON.parse(raw);
      if (Array.isArray(arr)) return new Set(arr);
    } catch (e) { /* повреждённый параметр — игнорируем */ }
  }
  const q = params.get("discovered");
  if (q) return new Set(q.split(",").map(s => s.trim()).filter(Boolean));
  return new Set();
}

const discovered = resolveDiscovered();
const state = { search: "", count: null, archetype: null };

function seedMotes() {
  const box = document.getElementById("motes");
  for (let i = 0; i < 22; i++) {
    const m = document.createElement("div");
    m.className = "mote drift-down";
    m.style.left = Math.random() * 100 + "%";
    m.style.setProperty("--drift", (Math.random() * 64 - 32).toFixed(0) + "px");
    m.style.animationDuration = (9 + Math.random() * 11).toFixed(1) + "s";
    m.style.animationDelay = (Math.random() * 12).toFixed(1) + "s";
    box.appendChild(m);
  }
}

function icon(archKey) {
  const a = ARCHETYPES[archKey];
  return '<svg viewBox="0 0 16 16">' + (a ? a.icon : Q_ICON) + "</svg>";
}

function buildFilters() {
  const counts = [...new Set(SYNERGIES_DATA.map(s => s.ingredient_count))].sort((a, b) => a - b);
  const cbox = document.getElementById("count-filters");
  cbox.innerHTML = counts.map(c => '<div class="chip" role="button" tabindex="0" data-count="' + c + '">' + c + " ингр.</div>").join("");
  const abox = document.getElementById("arch-filters");
  abox.innerHTML = Object.entries(ARCHETYPES).map(([k, a]) =>
    '<div class="chip" role="button" tabindex="0" data-arch="' + k + '" style="--chip-c:' + a.color + '">' + icon(k) + " " + a.label + "</div>"
  ).join("");

  function bind(el, fn) {
    el.addEventListener("click", fn);
    el.addEventListener("keydown", e => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); fn(); } });
  }
  cbox.querySelectorAll(".chip").forEach(el => bind(el, () => {
    const c = Number(el.dataset.count);
    state.count = state.count === c ? null : c;
    render();
  }));
  abox.querySelectorAll(".chip").forEach(el => bind(el, () => {
    const a = el.dataset.arch;
    state.archetype = state.archetype === a ? null : a;
    render();
  }));
}

function matches(s) {
  const isOpen = discovered.has(s.name);
  if (state.count !== null && s.ingredient_count !== state.count) return false;
  /* Закрытые записи не участвуют в поиске и фильтре по архетипу —
     иначе они выдавали бы скрытую информацию о составе и типе. */
  if (state.archetype !== null) {
    if (!isOpen) return false;
    if (s.archetype !== state.archetype) return false;
  }
  if (state.search) {
    if (!isOpen) return false;
    const q = state.search.toLowerCase();
    const inName = s.name.toLowerCase().includes(q);
    const inMats = s.ingredients.some(c => (MATERIAL_NAMES[c] || c).toLowerCase().includes(q));
    if (!inName && !inMats) return false;
  }
  return true;
}

function numChip(label, val, invert) {
  if (!val) return "";
  const good = invert ? val < 0 : val > 0;
  const sign = val > 0 ? "+" : "";
  return '<span class="nchip ' + (good ? "good" : "bad") + '">' + label + " <b>" + sign + val + "</b></span>";
}

function statBar(label, val) {
  if (!val) return "";
  const w = Math.min(100, Math.round(Math.abs(val) / STAT_MAX * 100));
  const neg = val < 0;
  return '<div class="sb-row"><span class="k">' + label + '</span>' +
    '<div class="sb-track"><div class="sb-fill' + (neg ? " neg" : "") + '" style="width:' + w + '%"></div></div>' +
    '<span class="v' + (neg ? " neg" : "") + '">' + (val > 0 ? "+" : "") + val + "</span></div>";
}

function sealSvg() {
  return '<svg viewBox="0 0 34 34" fill="none">' +
    '<circle cx="17" cy="17" r="14.5" stroke="var(--arch-locked)" stroke-width="1.4" opacity=".8"/>' +
    '<circle cx="17" cy="17" r="10.5" stroke="var(--arch-locked)" stroke-width=".8" stroke-dasharray="2.5 3" opacity=".6"/>' +
    '<g transform="translate(9,9)" stroke="var(--arch-locked)" stroke-width="1.3" opacity=".85"><path d="M8 3.5 L12.5 5.5 V9 C12.5 11.5 10.5 13 8 14 C5.5 13 3.5 11.5 3.5 9 V5.5 Z"/></g></svg>';
}

function cardHtml(s, i) {
  const stagger = ' style="--stagger:' + Math.min(i * 26, 500) + 'ms;';
  if (!discovered.has(s.name)) {
    const mats = s.ingredients.map(() => "<li>?????</li>").join("");
    return '<div class="card locked"' + stagger + '--card-acc:var(--arch-locked)">' +
      '<div class="seal">' + sealSvg() + "</div>" +
      '<div class="card-head"><span class="arch-badge">' + icon(null) + ' ???</span>' +
      '<span class="ing-count">' + s.ingredient_count + ' ингр.</span></div>' +
      '<h3 class="card-title">Неизвестная синергия</h3>' +
      '<ul class="ing-list blurred">' + mats + "</ul>" +
      '<p class="locked-hint">— требуется первый крафт —</p></div>';
  }
  const a = ARCHETYPES[s.archetype] || {};
  const mats = s.ingredients.map(c => "<li>" + (MATERIAL_NAMES[c] || c) + "</li>").join("");
  const chips = [
    s.mult ? '<span class="nchip good">Множ. <b>×' + (1 + s.mult).toFixed(2) + "</b></span>" : "",
    numChip("Физ.защ", s.phys),
    numChip("Маг.защ", s.mag),
    numChip("Дефект", s.defect_mod, true),
  ].filter(Boolean).join("");
  const bars = [
    statBar("Сила", s.str), statBar("Ловк.", s.agi),
    statBar("Живуч.", s.vit), statBar("Маг.сила", s.mp),
    statBar("Стамина", s.stamina), statBar("Мана", s.mana),
    statBar("Цирк.", s.circ),
  ].filter(Boolean).join("");
  return '<div class="card unlocked"' + stagger + "--card-acc:" + (a.color || "var(--rule)") + '">' +
    '<div class="card-head"><span class="arch-badge">' + icon(s.archetype) + " " + (a.label || s.archetype) + "</span>" +
    '<span class="ing-count">' + s.ingredient_count + ' ингр.</span></div>' +
    '<h3 class="card-title">' + s.name + "</h3>" +
    '<ul class="ing-list">' + mats + "</ul>" +
    '<hr class="divider">' +
    (chips ? '<p class="sect-label">Свойства брони</p><div class="num-chips">' + chips + "</div>" : "") +
    (bars ? '<p class="sect-label">Статы носителя</p><div class="stat-bars">' + bars + "</div>" : "") +
    '<hr class="divider"><p class="note">«' + s.note + "»</p></div>";
}

function render() {
  const grid = document.getElementById("grid");

  if (!SYNERGIES_DATA.length) {
    grid.innerHTML = '<div class="empty-state"><div class="big">Страницы гримуара пусты</div>' +
      "Данные синергий ещё не встроены в этот файл.<br>Обновите страницу позже.</div>";
  } else {
    const list = SYNERGIES_DATA.filter(matches);
    grid.innerHTML = list.length
      ? list.map((s, i) => cardHtml(s, i)).join("")
      : '<div class="empty-state">Ничего не найдено — измените фильтры.<br>Помните: закрытые синергии не участвуют в поиске.</div>';
  }

  document.getElementById("p-count").textContent = discovered.size;
  document.getElementById("p-total").textContent = SYNERGIES_DATA.length;
  const pct = SYNERGIES_DATA.length ? Math.round(100 * discovered.size / SYNERGIES_DATA.length) : 0;
  document.getElementById("p-fill").style.width = pct + "%";

  document.querySelectorAll("#count-filters .chip").forEach(el =>
    el.classList.toggle("active", Number(el.dataset.count) === state.count));
  document.querySelectorAll("#arch-filters .chip").forEach(el =>
    el.classList.toggle("active", el.dataset.arch === state.archetype));
}

document.getElementById("search").addEventListener("input", e => { state.search = e.target.value; render(); });

seedMotes();
