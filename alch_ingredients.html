<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Lora:ital,wght@0,400;0,500;1,400;1,500&family=JetBrains+Mono:wght@400;600&display=swap');

:root {
  --bg: #090d09; --bg-2: #0e150f; --panel: #131c14; --panel-hi: #1a261b;
  --text: #cfdcc9; --muted: #83917f; --faint: #4a5647;
  --rule: #253224; --rule-soft: #1c271c;
  --acc: #5cb86b; --acc-soft: #a3e0a8;
  --neg: #c9705f; --pos: #8fbf6e;
  --r: 4px;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background:
    radial-gradient(ellipse 1000px 460px at 15% -8%, rgba(92,184,107,0.12), transparent 62%),
    radial-gradient(ellipse 800px 400px at 90% -4%, rgba(60,120,80,0.08), transparent 60%),
    linear-gradient(180deg, var(--bg-2) 0%, var(--bg) 340px);
  background-color: var(--bg);
  color: var(--text);
  font-family: 'Lora', Georgia, serif;
  min-height: 100vh;
}

/* Споры, поднимающиеся из котла */
.motes { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0; }
.mote { --drift: 0px; position: absolute; bottom: -12px; width: 3px; height: 3px;
  border-radius: 50%; background: #7ed488; opacity: 0; filter: blur(.5px);
  animation: rise linear infinite; }
@keyframes rise {
  0% { transform: translate(0,0); opacity: 0; }
  8% { opacity: .5; } 92% { opacity: .12; }
  100% { transform: translate(var(--drift), -105vh); opacity: 0; }
}
@media (prefers-reduced-motion: reduce) { .mote { display: none; } }

.wrap { position: relative; z-index: 1; max-width: 1180px; margin: 0 auto; padding: 44px 20px 90px; }

header.top { text-align: center; margin-bottom: 30px; }
.eyebrow { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: .3em;
  text-transform: uppercase; color: var(--faint); margin-bottom: 16px; }
.sigil { width: 48px; height: 48px; margin: 0 auto 10px; opacity: .85; }
.sigil svg { width: 100%; height: 100%; fill: none; stroke: var(--acc); stroke-width: 2; }
h1.title { font-family: 'Cinzel', serif; font-weight: 700; font-size: clamp(30px, 5.4vw, 48px);
  letter-spacing: .015em; margin: 0 0 6px;
  background: linear-gradient(180deg, #e8f2dd 0%, #a8cf92 58%, #5f8a4f 100%);
  -webkit-background-clip: text; background-clip: text; color: transparent; }
.title-rule { width: 220px; height: 14px; margin: 2px auto 14px; opacity: .7; }
.title-rule svg { width: 100%; height: 100%; }
.subtitle { color: var(--muted); font-style: italic; font-size: 15px;
  max-width: 580px; margin: 0 auto 24px; line-height: 1.55; }

.progress-pill { display: inline-flex; align-items: center; gap: 14px;
  font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--muted);
  border: 1px solid var(--rule); border-radius: 999px; padding: 9px 20px;
  background: rgba(255,255,255,.02); }
.progress-pill b { color: var(--text); font-weight: 600; }
.pb-track { width: 150px; height: 5px; border-radius: 3px; background: var(--rule-soft); overflow: hidden; }
.pb-fill { height: 100%; border-radius: 3px;
  background: linear-gradient(90deg, var(--acc), var(--acc-soft));
  box-shadow: 0 0 8px var(--acc); transition: width .6s cubic-bezier(.2,.8,.2,1); }

.filters { position: sticky; top: 0; z-index: 6;
  background: color-mix(in srgb, var(--bg) 86%, transparent);
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--rule); padding: 14px 0 15px; margin-bottom: 28px; }
.filters-inner { display: flex; flex-wrap: wrap; gap: 10px 14px; align-items: center; justify-content: center; }
.search-box { flex: 1 1 230px; max-width: 330px; background: var(--panel);
  border: 1px solid var(--rule); border-radius: var(--r); padding: 10px 14px;
  color: var(--text); font-family: 'Lora', serif; font-size: 14px; transition: border-color .15s; }
.search-box::placeholder { color: var(--faint); }
.search-box:focus { outline: none; border-color: var(--acc); }
.chip-group { display: flex; gap: 6px; flex-wrap: wrap; }
.chip { font-family: 'JetBrains Mono', monospace; font-size: 12px; padding: 7px 12px;
  border-radius: var(--r); border: 1px solid var(--rule); background: var(--panel);
  color: var(--muted); cursor: pointer; user-select: none;
  display: inline-flex; align-items: center; gap: 6px;
  transition: border-color .15s, color .15s, background .15s, transform .1s; }
.chip:hover { border-color: var(--faint); color: var(--text); }
.chip:active { transform: scale(.97); }
.chip.active { color: var(--bg); background: var(--acc); border-color: var(--acc); font-weight: 600; }

.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }

.card { position: relative;
  background: linear-gradient(160deg, var(--panel-hi) 0%, var(--panel) 46%);
  border: 1px solid var(--rule); border-left: 3px solid var(--rule);
  border-radius: var(--r); padding: 17px 17px 15px;
  opacity: 0; transform: translateY(10px);
  animation: card-in .45s ease forwards; animation-delay: var(--stagger, 0s);
  transition: transform .16s ease, box-shadow .16s ease, border-color .16s ease; }
.card.some { border-left-color: color-mix(in srgb, var(--acc) 45%, var(--rule)); }
.card.full { border-left-color: var(--acc); }
@keyframes card-in { to { opacity: 1; transform: none; } }
@media (prefers-reduced-motion: reduce) { .card { animation: none; opacity: 1; transform: none; } }
.card:hover { transform: translateY(-3px);
  box-shadow: 0 14px 30px -14px rgba(0,0,0,.65), 0 0 22px -14px var(--acc); }

.card-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.cat-badge { display: inline-flex; align-items: center; gap: 6px;
  font-family: 'JetBrains Mono', monospace; font-size: 10.5px; letter-spacing: .08em;
  text-transform: uppercase; color: var(--muted); }
.known-count { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; color: var(--faint);
  border: 1px solid var(--rule); border-radius: 999px; padding: 2px 9px; white-space: nowrap; }
.known-count.full { color: var(--acc); border-color: color-mix(in srgb, var(--acc) 45%, var(--rule)); }

.card-title { font-family: 'Cinzel', serif; font-weight: 600; font-size: 17.5px;
  color: var(--text); margin: 0 0 3px; line-height: 1.28; }
.biome { font-size: 11.5px; color: var(--faint); font-style: italic; margin: 0 0 12px; }

.eff-list { display: flex; flex-direction: column; gap: 7px; }
.eff-row { display: grid; grid-template-columns: 16px 1fr auto; align-items: center; gap: 9px;
  font-size: 13px; padding: 7px 10px; border-radius: 3px;
  background: rgba(255,255,255,.02); border: 1px solid var(--rule-soft); }
.eff-row .dot { width: 8px; height: 8px; border-radius: 50%; justify-self: center; }
.eff-row.pos .dot { background: var(--pos); box-shadow: 0 0 6px var(--pos); }
.eff-row.negv .dot { background: var(--neg); box-shadow: 0 0 6px var(--neg); }
.eff-row .lbl { color: var(--text); }
.eff-row.negv .lbl { color: color-mix(in srgb, var(--neg) 70%, var(--text)); }
.pips { display: inline-flex; gap: 3px; }
.pip { width: 7px; height: 7px; border-radius: 2px; background: var(--rule); }
.eff-row.pos .pip.on { background: var(--pos); }
.eff-row.negv .pip.on { background: var(--neg); }

.eff-row.hidden-eff { border-style: dashed; }
.eff-row.hidden-eff .dot { background: var(--faint); box-shadow: none; }
.eff-row.hidden-eff .lbl { color: var(--faint); font-style: italic; filter: blur(2px); user-select: none; }
.eff-row.hidden-eff .q { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--faint); }

.empty-state { grid-column: 1 / -1; text-align: center; padding: 70px 20px;
  color: var(--faint); font-style: italic; line-height: 1.7; }

@media (max-width: 520px) {
  .wrap { padding: 26px 13px 64px; }
  .grid { grid-template-columns: 1fr; }
  .progress-pill { flex-wrap: wrap; justify-content: center; }

/* Прогресс: window.NIGHTMARE_DISCOVERED (["Имя|effect",...]) → ?lz= → ?discovered= */
function resolveDiscovered() {
  if (Array.isArray(window.NIGHTMARE_DISCOVERED)) return new Set(window.NIGHTMARE_DISCOVERED);
  const params = new URLSearchParams(location.search);
  const lz = params.get("lz");
  if (lz && typeof LZString !== "undefined") {
    try {
      const arr = JSON.parse(LZString.decompressFromEncodedURIComponent(lz));
      if (Array.isArray(arr)) return new Set(arr);
    } catch (e) {}
  }
  const q = params.get("discovered");
  if (q) return new Set(q.split(",").map(s => s.trim()).filter(Boolean));
  return new Set();
}

const discovered = resolveDiscovered();
const state = { search: "", category: null };
const TOTAL = REAGENTS_DATA.reduce((a, r) => a + r.effects.length, 0);

function seedMotes() {
  const box = document.getElementById("motes");
  for (let i = 0; i < 22; i++) {
    const m = document.createElement("div");
    m.className = "mote";
    m.style.left = Math.random() * 100 + "%";
    m.style.setProperty("--drift", (Math.random() * 64 - 32).toFixed(0) + "px");
    m.style.animationDuration = (9 + Math.random() * 11).toFixed(1) + "s";
    m.style.animationDelay = (Math.random() * 12).toFixed(1) + "s";
    box.appendChild(m);
  }
}

function isKnown(r, eff) { return discovered.has(r.id + "|" + eff.key); }

function buildFilters() {
  const box = document.getElementById("cat-filters");
  box.innerHTML = Object.entries(CATEGORIES).map(([k, c]) =>
    '<div class="chip" role="button" tabindex="0" data-cat="' + k + '">' + c.icon + " " + c.label + "</div>"
  ).join("");
  box.querySelectorAll(".chip").forEach(el => {
    const fn = () => {
      const c = el.dataset.cat;
      state.category = state.category === c ? null : c;
      render();
    };
    el.addEventListener("click", fn);
    el.addEventListener("keydown", e => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); fn(); } });
  });
}

function matches(r) {
  if (state.category !== null && r.category !== state.category) return false;
  if (state.search) {
    const q = state.search.toLowerCase();
    const inName = r.id.toLowerCase().includes(q);
    /* Свойства участвуют в поиске ТОЛЬКО если изучены */
    const inEff = r.effects.some(e => isKnown(r, e) && e.label.toLowerCase().includes(q));
    if (!inName && !inEff) return false;
  }
  return true;
}

function pips(potency) {
  let out = "";
  for (let i = 1; i <= MAX_POTENCY; i++) {
    out += '<span class="pip' + (i <= potency ? " on" : "") + '"></span>';
  }
  return out;
}

function effRow(r, e) {
  if (!isKnown(r, e)) {
    return '<div class="eff-row hidden-eff"><span class="dot"></span>' +
      '<span class="lbl">неизвестное свойство</span>' +
      '<span class="q">— ? —</span></div>';
  }
  const cls = e.neg ? "negv" : "pos";
  return '<div class="eff-row ' + cls + '"><span class="dot"></span>' +
    '<span class="lbl">' + e.label + "</span>" +
    '<span class="pips" title="Сила ' + e.potency + '">' + pips(e.potency) + "</span></div>";
}

function cardHtml(r, i) {
  const known = r.effects.filter(e => isKnown(r, e)).length;
  const total = r.effects.length;
  const cls = known === 0 ? "" : (known === total ? "full" : "some");
  const cat = CATEGORIES[r.category] || { label: r.category, icon: "" };
  return '<div class="card ' + cls + '" style="--stagger:' + Math.min(i * 24, 480) + 'ms">' +
    '<div class="card-head"><span class="cat-badge">' + cat.icon + " " + cat.label + "</span>" +
    '<span class="known-count' + (known === total ? " full" : "") + '">' + known + " / " + total + "</span></div>" +
    '<h3 class="card-title">' + r.emoji + " " + r.id + "</h3>" +
    '<p class="biome">' + r.biome + "</p>" +
    '<div class="eff-list">' + r.effects.map(e => effRow(r, e)).join("") + "</div></div>";
}

function render() {
  const grid = document.getElementById("grid");
  const list = REAGENTS_DATA.filter(matches);
  grid.innerHTML = list.length
    ? list.map((r, i) => cardHtml(r, i)).join("")
    : '<div class="empty-state">Ничего не найдено — измените фильтры.<br>Помните: неизученные свойства не участвуют в поиске.</div>';

  let known = 0;
  for (const r of REAGENTS_DATA) for (const e of r.effects) if (isKnown(r, e)) known++;
  document.getElementById("p-count").textContent = known;
  document.getElementById("p-total").textContent = TOTAL;
  document.getElementById("p-fill").style.width = (TOTAL ? Math.round(100 * known / TOTAL) : 0) + "%";

  document.querySelectorAll("#cat-filters .chip").forEach(el =>
    el.classList.toggle("active", el.dataset.cat === state.category));
}

document.getElementById("search").addEventListener("input", e => { state.search = e.target.value; render(); });

seedMotes();
buildFilters();
render();
</script>
</body>
</html>
