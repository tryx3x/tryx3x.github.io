<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Профессии — NightmareSpire</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#08070d;--surface:#12101c;--surface2:#191625;--border:rgba(255,255,255,0.07);
  --text:#c8c4d4;--muted:#5a5570;--heading:#ece7f5;
  --brand:#e74c3c;--brand-deep:#c0392b;--brand-dim:rgba(231,76,60,0.10);
  --gold:#c9a84c;--gold-glow:#e8cf7a;
  --accent:#8b6cf0;--accent-dim:rgba(139,108,240,0.10);
  --ok:#4cc97a;--lock:#5a5570;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Crimson Pro',Georgia,serif;background:var(--bg);color:var(--text);
  min-height:100vh;padding-bottom:48px;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse 60% 35% at 50% 0%,rgba(231,76,60,0.07),transparent),
    radial-gradient(ellipse 50% 60% at 90% 100%,rgba(139,108,240,0.06),transparent);
  pointer-events:none;z-index:0;}
.wrap{position:relative;z-index:1;max-width:540px;margin:0 auto;padding:0 0 32px;}

/* ── Header ── */
.header{padding:28px 18px 16px;text-align:center;position:relative;}
.header::after{content:'';position:absolute;left:50%;bottom:0;transform:translateX(-50%);
  width:160px;height:1px;
  background:linear-gradient(90deg,transparent,var(--brand),transparent);opacity:.6;}
.eyebrow{font-family:'Cinzel',serif;font-size:10px;font-weight:600;
  letter-spacing:0.3em;color:var(--brand);text-transform:uppercase;opacity:.85;margin-bottom:8px;}
.header h1{font-family:'Cinzel',serif;font-size:22px;font-weight:900;
  color:var(--heading);letter-spacing:.07em;text-shadow:0 0 26px rgba(231,76,60,.3);}
.header-sub{font-size:13px;color:var(--muted);margin-top:6px;font-style:italic;}

/* ── Profession tabs ── */
.ptabs{display:flex;gap:4px;margin:14px 14px 0;padding:4px;
  background:var(--surface);border:1px solid var(--border);border-radius:12px;
  position:sticky;top:8px;z-index:20;backdrop-filter:blur(8px);}
.ptab{flex:1;padding:9px 2px;text-align:center;border-radius:8px;cursor:pointer;
  user-select:none;-webkit-tap-highlight-color:transparent;
  transition:background .2s;display:flex;flex-direction:column;align-items:center;gap:2px;}
.ptab .pi{font-size:18px;line-height:1;filter:grayscale(.7);opacity:.55;transition:filter .2s,opacity .2s;display:flex;align-items:center;justify-content:center;}
.ptab .pi img{width:22px;height:22px;object-fit:contain;}
.ptab .pl{font-family:'Cinzel',serif;font-size:9px;color:var(--muted);letter-spacing:.03em;}
.ptab.active{background:linear-gradient(160deg,rgba(231,76,60,.18),rgba(192,57,43,.08));
  box-shadow:inset 0 0 0 1px rgba(231,76,60,.3);}
.ptab.active .pi{filter:none;opacity:1;}
.ptab.active .pl{color:var(--brand);}

/* ── Page content ── */
.page{display:none;padding:14px 14px 0;}
.page.active{display:block;animation:fadeUp .3s ease both;}

.prof-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;
  padding:16px;margin-bottom:12px;}
.prof-top{display:flex;align-items:center;gap:13px;}
.prof-icon{width:48px;height:48px;border-radius:12px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:23px;
  background:rgba(0,0,0,.3);border:1px solid var(--border);}
.prof-icon img{width:30px;height:30px;object-fit:contain;vertical-align:middle;}
.prof-tb{flex:1;min-width:0;}
.prof-name{font-family:'Cinzel',serif;font-size:16px;font-weight:700;color:var(--heading);}
.prof-lvl{font-size:11px;color:var(--gold);font-family:'Cinzel',serif;letter-spacing:.05em;margin-top:2px;}
.exp-bar{height:6px;background:rgba(0,0,0,.4);border-radius:3px;margin-top:11px;overflow:hidden;}
.exp-fill{height:100%;border-radius:3px;
  background:linear-gradient(90deg,var(--brand-deep),var(--brand));
  box-shadow:0 0 8px rgba(231,76,60,.5);transition:width .8s ease;}
.exp-text{font-size:11.5px;color:var(--muted);margin-top:6px;}

.d-title{font-family:'Cinzel',serif;font-size:10px;font-weight:600;letter-spacing:.2em;
  color:var(--brand);text-transform:uppercase;padding:16px 2px 9px;}
.kv{display:flex;justify-content:space-between;align-items:center;gap:10px;
  padding:8px 11px;background:var(--surface);border:1px solid var(--border);
  border-radius:9px;margin-bottom:5px;}
.kv-k{font-size:12.5px;color:var(--muted);}
.kv-v{font-family:'Cinzel',serif;font-size:12.5px;color:var(--heading);text-align:right;}
.kv-v.gold{color:var(--gold-glow);}

/* chips руд / самоцветов */
.chips{display:flex;flex-wrap:wrap;gap:6px;}
.chip{font-size:12px;padding:4px 10px;border-radius:16px;
  background:rgba(76,201,122,.08);border:1px solid rgba(76,201,122,.22);color:#8fdcae;}
.chip.gem{background:var(--accent-dim);border-color:rgba(139,108,240,.25);color:#b3a0f5;}
.chip.lock{background:rgba(0,0,0,.2);border-color:var(--border);color:var(--lock);}
.chip.lock .req{color:#7a7490;font-style:italic;}

/* таблица типов */
.types{display:flex;flex-direction:column;gap:6px;}
.type-row{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:9px 12px;}
.type-head{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.type-name{font-family:'Cinzel',serif;font-size:13px;font-weight:600;color:var(--heading);}
.type-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px;}
.tt{font-size:10.5px;padding:2px 8px;border-radius:12px;letter-spacing:.02em;}

/* ── Цветовая схема статов ──
   Сила — жёлтая · Живучесть — красная · Ловкость — зелёная
   Маг. сила — синяя · Крит — фиолетово-розовый */
.tt.str {background:rgba(232,207,122,.09);border:1px solid rgba(201,168,76,.3); color:#e8cf7a;}
.tt.vit {background:rgba(231,76,60,.09);  border:1px solid rgba(231,76,60,.3);  color:#f08070;}
.tt.agi {background:rgba(76,201,122,.09); border:1px solid rgba(76,201,122,.3); color:#8fdcae;}
.tt.mag {background:rgba(76,123,201,.09); border:1px solid rgba(76,123,201,.3); color:#7fa6e0;}
.tt.crit{background:rgba(224,122,208,.09);border:1px solid rgba(224,122,208,.3);color:#e08ad4;}
.tt.all {background:rgba(236,231,245,.06);border:1px solid rgba(236,231,245,.2);color:var(--heading);}
/* штраф — приглушённый */
.tt.neg {background:rgba(0,0,0,.22);border:1px solid var(--border);color:#6e6884;}
/* тип урона */
.tt.dphys{background:rgba(201,122,76,.1);border:1px solid rgba(201,122,76,.25);color:#c99a70;}
.tt.dmag {background:rgba(76,123,201,.1);border:1px solid rgba(76,123,201,.25);color:#7099c9;}
/* нейтральный (рецепты) */
.tt.recipe{background:rgba(139,108,240,.08);border:1px solid rgba(139,108,240,.25);color:#b3a0f5;}

.note{font-size:12px;color:var(--muted);font-style:italic;padding:10px 2px 0;line-height:1.5;}
.soon{text-align:center;font-size:13px;color:var(--muted);font-style:italic;padding:18px 0 6px;}

.bonus-box{background:linear-gradient(165deg,rgba(231,76,60,.07),var(--surface));
  border:1px solid rgba(231,76,60,.25);border-radius:11px;padding:12px 14px;margin-bottom:5px;}
.bonus-title{font-family:'Cinzel',serif;font-size:10px;letter-spacing:.16em;color:var(--brand);
  text-transform:uppercase;margin-bottom:8px;}
.bonus-line{display:flex;justify-content:space-between;font-size:13px;padding:3px 0;}
.bonus-line .bk{color:var(--muted);}
.bonus-line .bv{font-family:'Cinzel',serif;color:var(--ok);}

.state-box{text-align:center;padding:52px 24px;}
.state-icon{font-size:36px;margin-bottom:14px;opacity:.6;}
.state-title{font-family:'Cinzel',serif;font-size:15px;color:var(--heading);margin-bottom:8px;}
.state-sub{font-size:13px;color:var(--muted);line-height:1.55;}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
@media(prefers-reduced-motion:reduce){.page.active{animation:none;}}
</style>
</head>
<body>
<div class="wrap">

<div class="header">
  <div class="eyebrow">NightmareSpire</div>
  <h1>Профессии</h1>
  <div class="header-sub" id="header-sub">Мастерство вашего героя</div>
</div>

<div id="app"></div>

</div>
<script>
const tg = window.Telegram && window.Telegram.WebApp;
if (tg) { tg.ready(); tg.expand(); }

const ICONS = {
  mining:'⛏️', smithing:'⚒️', armorsmithing:'🛡️',
  alchemy:'⚗️',
  jeweling:'<img src="https://tryx3x.github.io/icons/jevel.png" style="width:22px;height:22px;object-fit:contain;vertical-align:-4px;">',
  jewelcrafting:'<img src="https://tryx3x.github.io/icons/jevel.png" style="width:22px;height:22px;object-fit:contain;vertical-align:-4px;">',
};
const SHORT = {
  mining:'Шахтёр', smithing:'Кузнец', armorsmithing:'Бронник',
  alchemy:'Алхимик', jeweling:'Ювелир', jewelcrafting:'Ювелир',
};

function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ═══ Теги статов: [класс, текст]
// классы: str=жёлтый, vit=красный, agi=зелёный, mag=синий, crit=розовый, neg=штраф, all=все статы

const WEAPON_TYPES = [
  { name:'Кинжал', type:'dphys', tags:[['agi','Ловкость ++'],['str','Сила +'],['crit','Крит ++'],['neg','Живучесть −']] },
  { name:'Меч',    type:'dphys', tags:[['str','Сила ++'],['agi','Ловкость +'],['neg','Маг. сила −']] },
  { name:'Топор',  type:'dphys', tags:[['str','Сила +++'],['vit','Живучесть +'],['neg','Ловкость −'],['neg','Маг. сила −−']] },
  { name:'Посох',  type:'dmag',  tags:[['mag','Маг. сила ++'],['vit','Живучесть +'],['neg','Сила −']] },
  { name:'Жезл',   type:'dmag',  tags:[['agi','Ловкость ++'],['mag','Маг. сила +'],['crit','Крит ++'],['neg','Сила −−']] },
  { name:'Орб',    type:'dmag',  tags:[['mag','Маг. сила +++'],['neg','Сила −−−'],['neg','Ловкость −'],['neg','Живучесть −']] },
];

const ARMOR_TYPES = [
  { name:'Лёгкая броня',  tags:[['agi','Ловкость ++'],['vit','Живучесть +']] },
  { name:'Средняя броня', tags:[['str','Сила +'],['vit','Живучесть +'],['agi','Ловкость +'],['neg','Ловкость −']] },
  { name:'Тяжёлая броня', tags:[['str','Сила ++'],['vit','Живучесть ++'],['neg','Ловкость −−−']] },
];

const JEWELRY_TYPES = [
  { name:'Кольцо', tags:[['recipe','2 металла'],['crit','1 самоцвет']] },
  { name:'Серьга', tags:[['recipe','2 металла'],['crit','1 самоцвет']] },
  { name:'Амулет', tags:[['recipe','2 металла'],['crit','1 самоцвет']] },
];

const GEM_LIST = [
  { name:'Рубин',            tags:[['str','Сила +++']] },
  { name:'Сапфир',           tags:[['mag','Маг. сила +++']] },
  { name:'Изумруд',          tags:[['vit','Живучесть +++']] },
  { name:'Алмаз',            tags:[['str','Сила +'],['agi','Ловкость +'],['mag','Маг. сила +']] },
  { name:'Аметист',          tags:[['mag','Маг. сила +++'],['vit','Живучесть +']] },
  { name:'Топаз',            tags:[['str','Сила ++'],['agi','Ловкость ++']] },
  { name:'Оникс',            tags:[['agi','Ловкость +++'],['crit','Крит +']] },
  { name:'Лунный камень',    tags:[['agi','Ловкость +'],['vit','Живучесть ++'],['mag','Маг. сила ++']] },
  { name:'Кристалл пустоты', tags:[['str','Сила ++'],['agi','Ловкость ++'],['mag','Маг. сила +++'],['crit','Крит +']] },
  { name:'Душа-самоцвет',    tags:[['all','Все статы ++'],['crit','Крит ++']] },
];

// ═══ Алхимия: типы варева и механика ═══
const ALCH_TYPES = [
  { name:'💊 Пилюля', tags:[['recipe','Ингредиенты одной категории'],['str','Полная сила эффектов']] },
  { name:'🧪 Зелье',  tags:[['recipe','Разные категории'],['neg','Сила ×0.6'],['vit','Действует дольше']] },
  { name:'☠️ Яд',    tags:[['recipe','Только негативные эффекты'],['crit','Накладывается на врагов']] },
];

function tagsHTML(tags){
  return '<div class="type-tags">'+tags.map(function(t){
    return '<span class="tt '+t[0]+'">'+t[1]+'</span>';
  }).join('')+'</div>';
}

function typesHTML(types, showDmgType){
  return '<div class="types">'+types.map(function(t){
    const typeTag = showDmgType && t.type
      ? '<span class="tt '+t.type+'">'+(t.type==='dphys'?'Физ. урон':'Маг. урон')+'</span>'
      : '';
    return '<div class="type-row">'
      + '<div class="type-head"><span class="type-name">'+t.name+'</span>'+typeTag+'</div>'
      + tagsHTML(t.tags)
      + '</div>';
  }).join('')+'</div>';
}

function chipsHTML(av, locked, gem){
  let h = '<div class="chips">';
  (av||[]).forEach(function(n){
    h += '<span class="chip'+(gem?' gem':'')+'">'+escHtml(n)+'</span>';
  });
  (locked||[]).forEach(function(pair){
    h += '<span class="chip lock">🔒 '+escHtml(pair[0])+' <span class="req">— с '+pair[1]+' ур.</span></span>';
  });
  return h + '</div>';
}

function bonusBox(title, lines){
  return '<div class="bonus-box"><div class="bonus-title">'+title+'</div>'
    + lines.map(function(l){
        return '<div class="bonus-line"><span class="bk">'+l[0]+'</span><span class="bv">'+l[1]+'</span></div>';
      }).join('')
    + '</div>';
}

// ═══════════ Детали профессий ═══════════

function miningDetail(p){
  const m = p.m || {};
  let h = '<div class="d-title">Характеристики</div>';
  h += '<div class="kv"><span class="kv-k">⚡ Добыча в час</span><span class="kv-v">≈'+(m.ef||'—')+' ед.</span></div>';
  h += '<div class="kv"><span class="kv-k">💎 Шанс самоцвета</span><span class="kv-v">'+(m.gm||'—')+'% / час</span></div>';
  h += '<div class="kv"><span class="kv-k">🏗️ Уровень шахты</span><span class="kv-v gold">'+(m.u||0)+'/'+(m.mx||5)+' · '+escHtml(m.lb||'')+'</span></div>';

  h += '<div class="d-title">✨ Редкие находки</div>';
  h += '<div class="kv"><span class="kv-k">😽 Жильная руда</span><span class="kv-v">8% за сессию <span style="color:var(--muted);font-size:11px">(+1%/час, макс ≈18%)</span></span></div>';
  h += '<div class="kv"><span class="kv-k">✨ Драгоценный камень</span><span class="kv-v">4% за сессию <span style="color:var(--muted);font-size:11px">(+1%/час)</span></span></div>';
  h += '<div class="kv"><span class="kv-k">🌋 Сущность Земли</span><span class="kv-v gold">0.1%</span></div>';

  if ((m.am && m.am.length) || (m.lm && m.lm.length)) {
    h += '<div class="d-title">Руды</div>' + chipsHTML(m.am, m.lm, false);
  }
  if ((m.ag && m.ag.length) || (m.lg && m.lg.length)) {
    h += '<div class="d-title">Самоцветы</div>' + chipsHTML(m.ag, m.lg, true);
  }
  return h;
}

function smithingDetail(p){
  const l = p.l;
  let h = bonusBox('Ваш бонус кузнеца — ур. '+l, [
    ['К урону оружия', '+'+(l*1.3).toFixed(1)],
    ['К шансу крита',  '+'+(l*0.15).toFixed(1)+'%'],
  ]);
  h += '<div class="d-title">Типы оружия</div>' + typesHTML(WEAPON_TYPES, true);
  h += '<div class="note">Итоговый урон и статы зависят от материалов, синергий, редкости и уровня кузнеца.</div>';
  return h;
}

function armorsmithingDetail(p){
  const l = p.l;
  let h = bonusBox('Ваш бонус бронника — ур. '+l, [
    ['К физ. защите', '+'+(l*0.6).toFixed(1)],
    ['К маг. защите', '+'+(l*0.4).toFixed(1)],
  ]);
  h += '<div class="d-title">Типы брони</div>' + typesHTML(ARMOR_TYPES, false);
  h += '<div class="note">Итоговая защита и статы зависят от материалов, синергий, редкости и уровня бронника.</div>';
  return h;
}

function jewelingDetail(p){
  const l = p.l;
  const add = Math.round(l * 0.3);
  let h = bonusBox('Ваш бонус ювелира — ур. '+l, [
    ['К каждому стату украшения', '+'+add],
  ]);
  h += '<div class="d-title">Типы украшений</div>' + typesHTML(JEWELRY_TYPES, false);
  h += '<div class="d-title">Самоцветы</div>' + typesHTML(GEM_LIST, false);
  h += '<div class="note">Металлы и их комбинации умножают статы самоцвета, редкость усиливает результат. Крит украшения ограничен 10%.</div>';
  return h;
}

function alchemyDetail(p){
  const l = p.l;
  const successChance = Math.min(93, 40 + l * 2.8).toFixed(0);
  let h = bonusBox('Ваш бонус алхимика — ур. '+l, [
    ['Шанс успешной варки', successChance+'%'],
    ['К силе эффектов',     '+'+(l*0.3).toFixed(1)],
  ]);

  h += '<div class="d-title">Типы варева</div>' + typesHTML(ALCH_TYPES, false);

  h += '<div class="d-title">Механика</div>';
  h += '<div class="kv"><span class="kv-k">Эффектов на крафт</span><span class="kv-v">2 <span style="color:var(--muted);font-size:11px">(3 с босс-материалом)</span></span></div>';
  h += '<div class="kv"><span class="kv-k">Ступени качества</span><span class="kv-v" style="font-size:11px">7 — от Отвратительной до Превосходной</span></div>';
  h += '<div class="kv"><span class="kv-k">Ингредиентов на варку</span><span class="kv-v">от 2</span></div>';

  h += '<div class="d-title">🔥 Босс-материалы</div>';
  h += '<div class="kv"><span class="kv-k">Эффектов</span><span class="kv-v gold">3 вместо 2</span></div>';
  h += '<div class="kv"><span class="kv-k">Провал варки</span><span class="kv-v gold">Невозможен</span></div>';
  h += '<div class="kv"><span class="kv-k">Мин. качество</span><span class="kv-v gold">Обычное</span></div>';
  h += '<div class="kv"><span class="kv-k">Длительность</span><span class="kv-v gold">×1.5</span></div>';

  h += '<div class="note">Ингредиенты собираются в семи регионах мира. Позитивные и негативные эффекты несовместимы — побеждает более сильная сторона.</div>';
  return h;
}

function buildDetail(p){
  if (p.c === 'mining')        return miningDetail(p);
  if (p.c === 'smithing')      return smithingDetail(p);
  if (p.c === 'armorsmithing') return armorsmithingDetail(p);
  if (p.c === 'alchemy')       return alchemyDetail(p);
  if (p.c === 'jeweling' || p.c === 'jewelcrafting') return jewelingDetail(p);
  return '<div class="soon">Подробная информация будет добавлена позже</div>';
}

// ═══════════ Рендер с вкладками ═══════════

function expBar(e, x){
  const pct = x > 0 ? Math.min(100, Math.round(e / x * 100)) : 100;
  return '<div class="exp-bar"><div class="exp-fill" style="width:'+pct+'%"></div></div>'
    + '<div class="exp-text">Опыт: '+e.toLocaleString('ru')+' / '+x.toLocaleString('ru')+' · до уровня: '+Math.max(0,x-e).toLocaleString('ru')+'</div>';
}

function render(profs){
  const app = document.getElementById('app');

  const tabsHTML = '<div class="ptabs">' + profs.map(function(p,i){
    return '<div class="ptab'+(i===0?' active':'')+'" data-i="'+i+'">'
      + '<span class="pi">'+(ICONS[p.c]||'📜')+'</span>'
      + '<span class="pl">'+(SHORT[p.c]||escHtml(p.n))+'</span>'
      + '</div>';
  }).join('') + '</div>';

  const pagesHTML = profs.map(function(p,i){
    return '<div class="page'+(i===0?' active':'')+'" data-i="'+i+'">'
      + '<div class="prof-card">'
      +   '<div class="prof-top">'
      +     '<div class="prof-icon">'+(ICONS[p.c]||'📜')+'</div>'
      +     '<div class="prof-tb">'
      +       '<div class="prof-name">'+escHtml(p.n)+'</div>'
      +       '<div class="prof-lvl">Уровень '+p.l+'</div>'
      +     '</div>'
      +   '</div>'
      +   expBar(p.e, p.x)
      + '</div>'
      + buildDetail(p)
      + '</div>';
  }).join('');

  app.innerHTML = tabsHTML + pagesHTML;

  app.querySelectorAll('.ptab').forEach(function(tab){
    tab.addEventListener('click', function(){
      const i = this.dataset.i;
      app.querySelectorAll('.ptab').forEach(function(t){ t.classList.remove('active'); });
      app.querySelectorAll('.page').forEach(function(pg){ pg.classList.remove('active'); });
      this.classList.add('active');
      app.querySelector('.page[data-i="'+i+'"]').classList.add('active');
      window.scrollTo({top:0});
    });
  });

  const total = profs.reduce(function(s,p){return s+p.l;},0);
  document.getElementById('header-sub').textContent =
    'Профессий: ' + profs.length + ' · Суммарный уровень: ' + total;
}

function showEmpty(){
  document.getElementById('app').innerHTML =
    '<div class="state-box">'
    + '<div class="state-icon">📜</div>'
    + '<div class="state-title">Профессий пока нет</div>'
    + '<div class="state-sub">Освойте первое ремесло в игре!</div>'
    + '</div>';
}

function showError(msg){
  document.getElementById('app').innerHTML =
    '<div class="state-box">'
    + '<div class="state-icon">⚠️</div>'
    + '<div class="state-title">Ошибка загрузки</div>'
    + '<div class="state-sub">'+escHtml(msg)+'</div>'
    + '</div>';
}

(function(){
  try {
    const raw = new URLSearchParams(window.location.search).get('data');
    if (!raw) { showEmpty(); return; }
    const profs = JSON.parse(decodeURIComponent(raw));
    if (!profs.length) { showEmpty(); return; }
    render(profs);
  } catch(e) {
    showError('Не удалось разобрать данные: ' + e.message);
  }
})();
</script>
</body>
</html>
