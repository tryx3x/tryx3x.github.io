<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Профессии — NightmareSpire</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#08070d;--surface:#12101c;--surface2:#191625;--border:rgba(255,255,255,0.07);
  --text:#c8c4d4;--muted:#5a5570;--heading:#ece7f5;
  --gold:#c9a84c;--gold-glow:#e8cf7a;--gold-dim:rgba(201,168,76,0.10);
  --accent:#8b6cf0;--accent-dim:rgba(139,108,240,0.10);
  --ok:#4cc97a;--lock:#5a5570;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Crimson Pro',Georgia,serif;background:var(--bg);color:var(--text);
  min-height:100vh;padding-bottom:48px;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse 60% 35% at 50% 0%,rgba(139,108,240,0.09),transparent),
    radial-gradient(ellipse 50% 60% at 90% 100%,rgba(201,168,76,0.06),transparent);
  pointer-events:none;z-index:0;}
.wrap{position:relative;z-index:1;max-width:540px;margin:0 auto;padding:0 0 32px;}

/* ── Header ── */
.header{padding:30px 18px 18px;text-align:center;position:relative;}
.header::after{content:'';position:absolute;left:50%;bottom:0;transform:translateX(-50%);
  width:160px;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.5;}
.eyebrow{font-family:'Cinzel',serif;font-size:10px;font-weight:600;
  letter-spacing:0.3em;color:var(--gold);text-transform:uppercase;opacity:.75;margin-bottom:8px;}
.header h1{font-family:'Cinzel',serif;font-size:22px;font-weight:900;
  color:var(--heading);letter-spacing:.07em;text-shadow:0 0 26px rgba(201,168,76,.25);}
.header-sub{font-size:13px;color:var(--muted);margin-top:6px;font-style:italic;}

.list{padding:16px 14px 0;display:flex;flex-direction:column;gap:10px;}

/* ── Profession card ── */
.prof{background:var(--surface);border:1px solid var(--border);border-radius:14px;
  overflow:hidden;animation:fadeUp .35s ease both;}
.prof-head{display:flex;align-items:center;gap:13px;padding:15px 16px;cursor:pointer;
  user-select:none;-webkit-tap-highlight-color:transparent;}
.prof-head:active{opacity:.85;}
.prof-icon{width:46px;height:46px;border-radius:12px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:22px;
  background:rgba(0,0,0,.3);border:1px solid var(--border);}
.prof-tb{flex:1;min-width:0;}
.prof-name{font-family:'Cinzel',serif;font-size:15px;font-weight:700;color:var(--heading);
  display:flex;align-items:baseline;gap:8px;}
.prof-lvl{font-size:11px;color:var(--gold);font-family:'Cinzel',serif;letter-spacing:.05em;}
.exp-bar{height:5px;background:rgba(0,0,0,.4);border-radius:3px;margin-top:8px;overflow:hidden;}
.exp-fill{height:100%;border-radius:3px;
  background:linear-gradient(90deg,var(--accent),#b39bff);
  box-shadow:0 0 8px rgba(139,108,240,.5);transition:width .8s ease;}
.exp-text{font-size:11px;color:var(--muted);margin-top:5px;}
.chev{flex-shrink:0;font-size:11px;color:var(--muted);transition:transform .25s;}
.prof.open .chev{transform:rotate(180deg);}

/* ── Detail ── */
.detail{display:none;padding:0 16px 16px;border-top:1px solid var(--border);}
.prof.open .detail{display:block;}
.d-title{font-family:'Cinzel',serif;font-size:10px;font-weight:600;letter-spacing:.2em;
  color:var(--gold);text-transform:uppercase;padding:14px 0 9px;}
.kv{display:flex;justify-content:space-between;align-items:center;
  padding:7px 10px;background:rgba(0,0,0,.18);border-radius:8px;margin-bottom:5px;}
.kv-k{font-size:12.5px;color:var(--muted);}
.kv-v{font-family:'Cinzel',serif;font-size:12.5px;color:var(--heading);}
.kv-v.gold{color:var(--gold-glow);}

/* chips руд / самоцветов */
.chips{display:flex;flex-wrap:wrap;gap:6px;}
.chip{font-size:12px;padding:4px 10px;border-radius:16px;
  background:rgba(76,201,122,.08);border:1px solid rgba(76,201,122,.22);color:#8fdcae;}
.chip.gem{background:var(--accent-dim);border-color:rgba(139,108,240,.25);color:#b3a0f5;}
.chip.lock{background:rgba(0,0,0,.2);border-color:var(--border);color:var(--lock);}
.chip.lock .req{color:#7a7490;font-style:italic;}

/* таблица типов (оружие / броня) */
.types{display:flex;flex-direction:column;gap:6px;}
.type-row{background:rgba(0,0,0,.18);border:1px solid var(--border);border-radius:9px;
  padding:9px 12px;}
.type-head{display:flex;align-items:center;justify-content:space-between;}
.type-name{font-family:'Cinzel',serif;font-size:13px;font-weight:600;color:var(--heading);}
.type-base{font-size:11px;color:var(--muted);font-family:'Cinzel',serif;}
.type-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px;}
.tt{font-size:10.5px;padding:2px 8px;border-radius:12px;letter-spacing:.02em;}
.tt.up  {background:rgba(76,201,122,.1);border:1px solid rgba(76,201,122,.25);color:#8fdcae;}
.tt.down{background:rgba(201,76,76,.1);border:1px solid rgba(201,76,76,.25);color:#c98080;}
.tt.phys{background:rgba(201,122,76,.1);border:1px solid rgba(201,122,76,.25);color:#c99a70;}
.tt.mag {background:rgba(76,123,201,.1);border:1px solid rgba(76,123,201,.25);color:#7099c9;}

.soon{text-align:center;font-size:13px;color:var(--muted);font-style:italic;padding:14px 0 4px;}

/* ── States ── */
.state-box{text-align:center;padding:52px 24px;}
.state-icon{font-size:36px;margin-bottom:14px;opacity:.6;}
.state-title{font-family:'Cinzel',serif;font-size:15px;color:var(--heading);margin-bottom:8px;}
.state-sub{font-size:13px;color:var(--muted);line-height:1.55;}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.prof:nth-child(2){animation-delay:.05s;}.prof:nth-child(3){animation-delay:.1s;}
.prof:nth-child(4){animation-delay:.15s;}.prof:nth-child(5){animation-delay:.2s;}
@media(prefers-reduced-motion:reduce){.prof{animation:none;}}
</style>
</head>
<body>
<div class="wrap">

<div class="header">
  <div class="eyebrow">NightmareSpire</div>
  <h1>Профессии</h1>
  <div class="header-sub" id="header-sub">Мастерство вашего героя</div>
</div>

<div class="list" id="list"></div>

</div>
<script>
const tg = window.Telegram && window.Telegram.WebApp;
if (tg) { tg.ready(); tg.expand(); }

const ICONS = { mining:'⛏️', smithing:'⚒️', armorsmithing:'🛡️', alchemy:'⚗️', jeweling:'💎' };

// ═══════════ Статическая справка: типы оружия (из WEAPON_TYPES) ═══════════
const WEAPON_TYPES = [
  { name:'Кинжал', dmg:10, crit:5, type:'phys', tags:[['up','Ловкость ++'],['up','Сила +'],['down','Живучесть −']] },
  { name:'Меч',    dmg:15, crit:1, type:'phys', tags:[['up','Сила ++'],['up','Ловкость +'],['down','Маг. сила −']] },
  { name:'Топор',  dmg:20, crit:0, type:'phys', tags:[['up','Сила +++'],['up','Живучесть +'],['down','Ловкость −'],['down','Маг. сила −']] },
  { name:'Посох',  dmg:8,  crit:1, type:'mag',  tags:[['up','Маг. сила ++'],['up','Живучесть +'],['down','Сила −']] },
  { name:'Жезл',   dmg:6,  crit:4, type:'mag',  tags:[['up','Ловкость ++'],['up','Маг. сила +'],['down','Сила −']] },
  { name:'Орб',    dmg:4,  crit:0, type:'mag',  tags:[['up','Маг. сила +++'],['down','Сила −−'],['down','Ловкость −']] },
];

// ═══════════ Статическая справка: типы брони (из ARMOR_TYPES) ═══════════
const ARMOR_TYPES = [
  { name:'Лёгкая броня',  pd:4,  md:2, tags:[['up','Ловкость ++'],['up','Живучесть +']] },
  { name:'Средняя броня', pd:7,  md:4, tags:[['up','Баланс статов'],['down','Ловкость −7']] },
  { name:'Тяжёлая броня', pd:11, md:6, tags:[['up','Сила ++'],['up','Живучесть ++'],['down','Ловкость −50']] },
];

function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function expBar(e, x){
  const pct = x > 0 ? Math.min(100, Math.round(e / x * 100)) : 100;
  return '<div class="exp-bar"><div class="exp-fill" style="width:'+pct+'%"></div></div>'
    + '<div class="exp-text">Опыт: '+e.toLocaleString('ru')+' / '+x.toLocaleString('ru')+' · '+pct+'%</div>';
}

function tagsHTML(tags){
  return '<div class="type-tags">'+tags.map(function(t){
    return '<span class="tt '+t[0]+'">'+t[1]+'</span>';
  }).join('')+'</div>';
}

function typesHTML(types, isWeapon){
  return '<div class="types">'+types.map(function(t){
    const base = isWeapon
      ? 'урон '+t.dmg+' · крит '+t.crit+'%'
      : 'физ '+t.pd+' · маг '+t.md;
    const typeTag = isWeapon
      ? '<span class="tt '+t.type+'">'+(t.type==='phys'?'Физ.':'Маг.')+'</span> '
      : '';
    return '<div class="type-row">'
      + '<div class="type-head"><span class="type-name">'+t.name+'</span>'
      + '<span class="type-base">'+typeTag+base+'</span></div>'
      + tagsHTML(t.tags)
      + '</div>';
  }).join('')+'</div>';
}

function chipsHTML(av, locked, gem){
  let h = '<div class="chips">';
  (av||[]).forEach(function(n){
    h += '<span class="chip'+(gem?' gem':'')+'">'+escHtml(n)+'</span>';
  });
  (locked||[]).forEach(function(pair){
    h += '<span class="chip lock">🔒 '+escHtml(pair[0])+' <span class="req">— с '+pair[1]+' ур.</span></span>';
  });
  return h + '</div>';
}

function miningDetail(m){
  let h = '<div class="d-title">Характеристики</div>';
  h += '<div class="kv"><span class="kv-k">⚡ Добыча в час</span><span class="kv-v">≈'+m.ef+' ед.</span></div>';
  h += '<div class="kv"><span class="kv-k">💠 Шанс самоцвета</span><span class="kv-v">'+m.gm+'% / час</span></div>';
  h += '<div class="kv"><span class="kv-k">🏗️ Уровень шахты</span><span class="kv-v gold">'+m.u+'/'+m.mx+' · '+escHtml(m.lb)+'</span></div>';

  if ((m.am && m.am.length) || (m.lm && m.lm.length)) {
    h += '<div class="d-title">Руды</div>' + chipsHTML(m.am, m.lm, false);
  }
  if ((m.ag && m.ag.length) || (m.lg && m.lg.length)) {
    h += '<div class="d-title">Самоцветы</div>' + chipsHTML(m.ag, m.lg, true);
  }
  return h;
}

function buildDetail(p){
  if (p.c === 'mining' && p.m) return miningDetail(p.m);
  if (p.c === 'smithing')
    return '<div class="d-title">Типы оружия</div>' + typesHTML(WEAPON_TYPES, true)
      + '<div class="soon">Урон и статы зависят от материалов, синергий и уровня кузнеца</div>';
  if (p.c === 'armorsmithing')
    return '<div class="d-title">Типы брони</div>' + typesHTML(ARMOR_TYPES, false)
      + '<div class="soon">Защита и статы зависят от материалов, синергий и уровня бронника</div>';
  return '<div class="soon">Подробная информация будет добавлена позже</div>';
}

function render(profs){
  const list = document.getElementById('list');
  list.innerHTML = profs.map(function(p){
    return '<div class="prof">'
      + '<div class="prof-head" onclick="this.parentNode.classList.toggle(\'open\')">'
      +   '<div class="prof-icon">'+(ICONS[p.c]||'📜')+'</div>'
      +   '<div class="prof-tb">'
      +     '<div class="prof-name">'+escHtml(p.n)+' <span class="prof-lvl">ур. '+p.l+'</span></div>'
      +     expBar(p.e, p.x)
      +   '</div>'
      +   '<span class="chev">▼</span>'
      + '</div>'
      + '<div class="detail">'+buildDetail(p)+'</div>'
      + '</div>';
  }).join('');

  const total = profs.reduce(function(s,p){return s+p.l;},0);
  document.getElementById('header-sub').textContent =
    'Профессий: ' + profs.length + ' · Суммарный уровень: ' + total;
}

function showEmpty(){
  document.getElementById('list').innerHTML =
    '<div class="state-box">'
    + '<div class="state-icon">📜</div>'
    + '<div class="state-title">Профессий пока нет</div>'
    + '<div class="state-sub">Освойте первое ремесло в игре!</div>'
    + '</div>';
}

function showError(msg){
  document.getElementById('list').innerHTML =
    '<div class="state-box">'
    + '<div class="state-icon">⚠️</div>'
    + '<div class="state-title">Ошибка загрузки</div>'
    + '<div class="state-sub">'+escHtml(msg)+'</div>'
    + '</div>';
}

(function(){
  try {
    const raw = new URLSearchParams(window.location.search).get('data');
    if (!raw) { showEmpty(); return; }
    const profs = JSON.parse(decodeURIComponent(raw));
    if (!profs.length) { showEmpty(); return; }
    render(profs);
  } catch(e) {
    showError('Не удалось разобрать данные: ' + e.message);
  }
})();
</script>
</body>
</html>
