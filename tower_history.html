<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>История Башни — NightmareSpire</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#08070d;--surface:#12101c;--surface2:#191625;--border:rgba(255,255,255,0.07);
  --text:#c8c4d4;--muted:#5a5570;--heading:#ece7f5;
  --gold:#c9a84c;--gold-dim:rgba(201,168,76,0.10);
  --accent:#7c4dff;--accent-dim:rgba(124,77,255,0.10);
  --ok:#4cc97a;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'Crimson Pro',Georgia,serif;background:var(--bg);color:var(--text);
  min-height:100vh;padding-bottom:48px;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse 60% 35% at 50% 0%,rgba(124,77,255,0.08),transparent),
    radial-gradient(ellipse 50% 60% at 90% 100%,rgba(201,168,76,0.06),transparent);
  pointer-events:none;z-index:0;}
.wrap{position:relative;z-index:1;max-width:540px;margin:0 auto;padding:0 0 32px;}

.header{padding:28px 18px 16px;text-align:center;border-bottom:1px solid var(--border);}
.eyebrow{font-family:'Cinzel',serif;font-size:10px;font-weight:600;
  letter-spacing:0.28em;color:var(--gold);text-transform:uppercase;opacity:.75;margin-bottom:8px;}
.header h1{font-family:'Cinzel',serif;font-size:21px;font-weight:900;
  color:var(--heading);letter-spacing:.06em;}
.header-sub{font-size:13px;color:var(--muted);margin-top:5px;font-style:italic;}

.stats-bar{display:flex;gap:1px;margin:14px 14px 0;border-radius:12px;overflow:hidden;
  border:1px solid var(--border);}
.stat{flex:1;padding:12px 8px;text-align:center;background:var(--surface);}
.stat:not(:last-child){border-right:1px solid var(--border);}
.stat-v{font-family:'Cinzel',serif;font-size:16px;font-weight:900;color:var(--heading);}
.stat-l{font-size:10px;color:var(--muted);margin-top:3px;text-transform:uppercase;
  letter-spacing:.08em;}

.search-wrap{margin:14px 14px 0;position:relative;}
.search-wrap input{width:100%;background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:10px 14px 10px 38px;color:var(--text);font:inherit;font-size:14px;
  outline:none;transition:border-color .2s;}
.search-wrap input:focus{border-color:rgba(124,77,255,.45);}
.search-wrap input::placeholder{color:var(--muted);}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);
  font-size:14px;opacity:.5;pointer-events:none;}

.section-title{font-family:'Cinzel',serif;font-size:10px;font-weight:600;
  letter-spacing:0.22em;color:var(--muted);text-transform:uppercase;padding:18px 18px 10px;}

.list{padding:0 14px;display:flex;flex-direction:column;gap:6px;}

.record{display:flex;align-items:center;gap:12px;
  background:var(--surface);border:1px solid var(--border);border-radius:12px;
  padding:12px 14px;position:relative;overflow:hidden;
  animation:fadeUp .35s ease both;}
.record::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;}

.record.m1::before{background:linear-gradient(180deg,#ffd700,#c9a84c);}
.record.m10::before{background:var(--accent);}
.record.m25::before{background:#4c7bc9;}
.record.m50::before{background:#c94c4c;}
.record.m100::before{background:linear-gradient(180deg,#ff6b6b,#c94c4c);}

.floor-badge{flex-shrink:0;width:48px;text-align:center;}
.floor-num{font-family:'Cinzel',serif;font-size:17px;font-weight:900;color:var(--heading);
  line-height:1;}
.floor-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;}

.divider-v{width:1px;background:var(--border);align-self:stretch;flex-shrink:0;}

.record-body{flex:1;min-width:0;}
.player-name{font-family:'Cinzel',serif;font-size:14px;font-weight:600;
  color:var(--heading);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.player-name.hidden{color:var(--muted);font-style:italic;}
.record-date{font-size:12px;color:var(--muted);margin-top:3px;}

.milestone-tag{flex-shrink:0;font-family:'Cinzel',serif;font-size:9px;
  padding:3px 8px;border-radius:20px;letter-spacing:.06em;text-transform:uppercase;}
.tag-1{background:rgba(255,215,0,.12);color:#d4af37;border:1px solid rgba(255,215,0,.25);}
.tag-10{background:var(--accent-dim);color:#a98bff;border:1px solid rgba(124,77,255,.3);}
.tag-25{background:rgba(76,123,201,.12);color:#7099c9;border:1px solid rgba(76,123,201,.3);}
.tag-50{background:rgba(201,76,76,.12);color:#c97070;border:1px solid rgba(201,76,76,.3);}
.tag-100{background:rgba(255,107,107,.14);color:#ff9090;border:1px solid rgba(201,76,76,.35);}

.state-box{text-align:center;padding:52px 24px;}
.state-icon{font-size:36px;margin-bottom:14px;opacity:.6;}
.state-title{font-family:'Cinzel',serif;font-size:15px;color:var(--heading);margin-bottom:8px;}
.state-sub{font-size:13px;color:var(--muted);line-height:1.55;}

.spinner{width:36px;height:36px;margin:0 auto 14px;
  border:3px solid var(--border);border-top-color:var(--accent);
  border-radius:50%;animation:spin .75s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

.no-results{display:none;text-align:center;padding:32px 18px;
  font-size:13px;color:var(--muted);font-style:italic;}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
@media(prefers-reduced-motion:reduce){.record,.spinner{animation:none;}}
</style>
</head>
<body>
<div class="wrap">

<div class="header">
  <div class="eyebrow">NightmareSpire</div>
  <h1>История Башни</h1>
  <div class="header-sub" id="header-sub">Первопроходцы каждого этажа</div>
</div>

<div id="app">
  <div class="state-box" id="state-loading">
    <div class="spinner"></div>
    <div class="state-title">Загружаем историю…</div>
    <div class="state-sub">Запрашиваем данные башни</div>
  </div>
</div>

</div>

<script>
const tg = window.Telegram && window.Telegram.WebApp;
if (tg) { tg.ready(); tg.expand(); }

const API_URL = 'http://38.244.138.119:8080/api/tower-history';
const API_KEY = 'ЗАМЕНИТЕ_НА_ВАШ_СЕКРЕТ';

function milestoneClass(floor) {
  if (floor % 100 === 0) return 'm100';
  if (floor % 50  === 0) return 'm50';
  if (floor % 25  === 0) return 'm25';
  if (floor % 10  === 0) return 'm10';
  if (floor === 1)       return 'm1';
  return '';
}
function milestoneTag(floor) {
  if (floor % 100 === 0) return ['tag-100', '⚡ Легенда'];
  if (floor % 50  === 0) return ['tag-50',  '🔥 Рубеж'];
  if (floor % 25  === 0) return ['tag-25',  '✦ Веха'];
  if (floor % 10  === 0) return ['tag-10',  '◈ Этап'];
  if (floor === 1)       return ['tag-1',   '★ Начало'];
  return null;
}

let allRecords = [];

function renderList(records) {
  const app = document.getElementById('app');
  if (!records.length) {
    app.innerHTML = '<div class="no-results" style="display:block">Ничего не найдено</div>';
    return;
  }

  const milestones = records.filter(r => milestoneClass(r.floor));

  const statsHTML =
    '<div class="stats-bar">'
    + '<div class="stat"><div class="stat-v">'+records.length+'</div><div class="stat-l">Этажей</div></div>'
    + '<div class="stat"><div class="stat-v">'+new Set(records.map(r=>r.player)).size+'</div><div class="stat-l">Героев</div></div>'
    + '<div class="stat"><div class="stat-v">'+milestones.length+'</div><div class="stat-l">Вех</div></div>'
    + '</div>';

  const searchHTML =
    '<div class="search-wrap"><span class="search-icon">🔍</span>'
    + '<input type="text" id="search-input" placeholder="Поиск по имени или этажу…"/>'
    + '</div>';

  const itemsHTML = records.map((r, i) => {
    const mc  = milestoneClass(r.floor);
    const tag = milestoneTag(r.floor);
    const tagHTML = tag ? '<div class="milestone-tag '+tag[0]+'">'+tag[1]+'</div>' : '';
    const nameClass = r.hidden ? 'player-name hidden' : 'player-name';
    return '<div class="record '+(mc||'')+'" style="animation-delay:'+(i*0.02).toFixed(2)+'s">'
      + '<div class="floor-badge"><div class="floor-num">'+r.floor+'</div><div class="floor-lbl">этаж</div></div>'
      + '<div class="divider-v"></div>'
      + '<div class="record-body">'
      +   '<div class="'+nameClass+'">'+escHtml(r.player)+'</div>'
      +   '<div class="record-date">'+r.date_fmt+'</div>'
      + '</div>'
      + tagHTML
      + '</div>';
  }).join('');

  app.innerHTML =
    statsHTML + searchHTML
    + '<div class="section-title">Рекорды</div>'
    + '<div class="list" id="record-list">' + itemsHTML + '</div>'
    + '<div class="no-results" id="no-results">Ничего не найдено</div>';

  document.getElementById('search-input').addEventListener('input', function() {
    const q = this.value.trim().toLowerCase();
    const items = document.querySelectorAll('#record-list .record');
    let visible = 0;
    items.forEach((el, i) => {
      const r = allRecords[i];
      const match = !q
        || r.player.toLowerCase().includes(q)
        || String(r.floor).includes(q);
      el.style.display = match ? '' : 'none';
      if (match) visible++;
    });
    document.getElementById('no-results').style.display = visible ? 'none' : 'block';
  });
}

function showError(msg) {
  document.getElementById('app').innerHTML =
    '<div class="state-box">'
    + '<div class="state-icon">⚠️</div>'
    + '<div class="state-title">Не удалось загрузить</div>'
    + '<div class="state-sub">'+escHtml(msg)+'<br><br>Попробуйте позже.</div>'
    + '</div>';
}

function showEmpty() {
  document.getElementById('app').innerHTML =
    '<div class="state-box">'
    + '<div class="state-icon">🗼</div>'
    + '<div class="state-title">Башня ждёт героев</div>'
    + '<div class="state-sub">Рекордов пока нет. Станьте первым!</div>'
    + '</div>';
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

(async function load() {
  try {
    const res = await fetch(API_URL, {
      headers: { 'X-API-Key': API_KEY },
      signal: AbortSignal.timeout ? AbortSignal.timeout(8000) : undefined,
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    allRecords = data;
    if (!data.length) { showEmpty(); return; }

    // Обновляем подзаголовок
    const maxFloor = data[data.length - 1]?.floor || 0;
    document.getElementById('header-sub').textContent =
      'Покорено этажей: ' + data.length + ' · Рекорд: ' + maxFloor + ' этаж';

    renderList(data);
  } catch(e) {
    showError(e.message || 'Ошибка соединения');
  }
})();
</script>
</body>
</html>
